<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>漫画 | 蘇魚</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <link rel="stylesheet" href="style.css">
  <meta name="referrer" content="no-referrer">
  <style>
    .comic-page {
      min-height: 100vh;
      padding-top: 80px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .comic-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .comic-header h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comic-header h1 .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gradient-short);
      color: #fff;
      font-weight: 500;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-home:hover {
      border-color: var(--accent-primary);
      transform: translateX(-2px);
    }

    .comic-search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .comic-search-wrap {
      display: flex;
      gap: 10px;
      max-width: 500px;
    }

    .comic-search-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .comic-search-input:focus {
      border-color: var(--accent-primary);
    }

    .comic-search-input::placeholder {
      color: var(--text-muted);
    }

    .comic-search-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .comic-search-btn:hover {
      transform: scale(1.03);
    }

    .comic-search-btn:active {
      transform: scale(0.98);
    }

    .comic-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .comic-tag {
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .comic-tag:hover,
    .comic-tag.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .comic-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      transition: all 0.3s;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .comic-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: var(--bg-tertiary);
      display: block;
    }

    .comic-card-info {
      padding: 10px 12px;
    }

    .comic-card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-card-chapter {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .comic-loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .comic-loading-tips {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .comic-error {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .comic-error svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }

    .comic-error-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .comic-error-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-error-btn:hover {
      border-color: var(--accent-primary);
    }

    .comic-error-btn.primary {
      background: var(--gradient-short);
      color: #fff;
      border-color: transparent;
    }

    .comic-error-detail {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      max-height: 150px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .comic-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comic-detail-cover {
      width: 140px;
      height: 190px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .comic-detail-meta {
      flex: 1;
      min-width: 200px;
    }

    .comic-detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .comic-detail-author {
      font-size: 0.95rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .comic-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .comic-detail-tag {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .comic-detail-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .comic-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .comic-back-btn:hover {
      border-color: var(--accent-primary);
    }

    .chapter-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .chapter-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      font-size: 0.88rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-reader {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-reader-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .comic-reader-images {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
    }

    .comic-reader-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .comic-reader-nav button {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-reader-nav button:hover:not(:disabled) {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: #fff;
    }

    .comic-reader-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .comic-reader-nav .nav-center {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .source-info {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-info .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .source-info .source-dot.loading {
      background: #f59e0b;
    }

    .source-info .source-dot.error {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 768px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .comic-card-info {
        padding: 8px 10px;
      }

      .comic-card-title {
        font-size: 0.82rem;
      }

      .comic-card-chapter {
        font-size: 0.72rem;
      }

      .comic-header h1 {
        font-size: 1.3rem;
      }

      .comic-detail-cover {
        width: 100px;
        height: 135px;
      }

      .comic-detail-title {
        font-size: 1.15rem;
      }

      .chapter-list {
        grid-template-columns: 1fr;
      }

      .comic-search-wrap {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .comic-header {
        padding: 16px 14px 12px;
      }

      .comic-search-bar,
      .comic-tags,
      .comic-grid,
      .comic-detail,
      .comic-reader,
      .source-info {
        padding-left: 14px;
        padding-right: 14px;
      }

      .comic-card-title {
        font-size: 0.76rem;
      }
    }

    .source-selector {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-selector-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-tab {
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .source-tab:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .source-tab.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .source-tab .source-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .source-tab .source-status.ok {
      background: #22c55e;
    }

    .source-tab .source-status.checking {
      background: #f59e0b;
      animation: pulse 1s ease-in-out infinite;
    }

    .source-tab .source-status.error {
      background: #ef4444;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
    }

    .comic-image-wrap {
      width: 100%;
      position: relative;
      background: var(--bg-tertiary);
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comic-image-wrap img {
      width: 100%;
      display: block;
    }

    .comic-image-placeholder {
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comic-image-placeholder .mini-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .watermark-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .watermark-badge.clean {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .watermark-badge.watermarked {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .chapter-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chapter-search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--bg-tertiary);
      color: var(--text-muted);
    }

    .chapter-search-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .chapter-search-input::placeholder {
      color: var(--text-muted);
    }

    .chapter-quick-actions {
      display: flex;
      gap: 6px;
    }

    .chapter-quick-actions button {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chapter-quick-actions button:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .chapter-group {
      margin-bottom: 8px;
    }

    .chapter-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .chapter-group-header:hover {
      background: var(--bg-tertiary);
    }

    .group-toggle-icon {
      transition: transform 0.2s;
      color: var(--text-muted);
    }

    .group-count {
      margin-left: auto;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .chapter-group-content {
      padding-left: 20px;
      margin-top: 4px;
    }

    .chapter-item.current {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-primary);
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .source-selector {
        padding: 0 14px;
      }
      .source-tab {
        padding: 5px 10px;
        font-size: 0.78rem;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar"><div class="progress-fill"></div></div>

  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">蘇魚</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="novel.html">小说</a></li>
        <li><a href="tools.html">工具</a></li>
        <li><a href="comic.html" style="color:var(--accent-primary);">漫画</a></li>
        <li><a href="https://su120315.github.io/SUYU3/" target="_blank" rel="noopener">编程</a></li>
        <li><a href="index.html#contact">联系</a></li>
      </ul>
    </div>
  </nav>

  <div class="comic-page">
    <div class="comic-header">
      <h1>
        <i data-lucide="book-open" style="width:28px;height:28px;color:var(--accent-primary);"></i>
        漫画阅读
        <span class="badge">纯净版</span>
      </h1>
      <a href="index.html" class="back-home">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
        返回主页
      </a>
    </div>

    <div class="comic-search-bar">
      <div class="comic-search-wrap">
        <input type="text" class="comic-search-input" id="searchInput" placeholder="搜索漫画名称..." onkeydown="if(event.key==='Enter') doSearch()">
        <button class="comic-search-btn" onclick="doSearch()">搜索</button>
      </div>
    </div>

    <div class="source-selector" id="sourceSelector">
      <span class="source-selector-label">
        <i data-lucide="database" style="width:14px;height:14px;"></i>
        漫画源:
      </span>
      <div class="source-tabs" id="sourceTabs"></div>
    </div>

    <div class="comic-tags" id="comicTags">
      <span class="comic-tag active" data-type="recommend">推荐</span>
      <span class="comic-tag" data-type="hot">热门</span>
      <span class="comic-tag" data-type="finish">完结</span>
      <span class="comic-tag" data-type="连载中">连载中</span>
    </div>

    <div class="source-info" id="sourceInfo" style="display:none;">
      <span class="source-dot" id="sourceDot"></span>
      <span id="sourceText">正在加载...</span>
    </div>

    <div id="comicContent">
      <div class="comic-loading">
        <div class="spinner"></div>
        <p>正在加载漫画...</p>
        <p class="comic-loading-tips">首次加载可能需要几秒钟，请耐心等待</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== 多漫画源架构 ====================
    var COMIC_SOURCES = [
      {
        id: 'baozimh',
        name: '包子漫画',
        domains: ['https://www.baozimh.com', 'https://cn.baozimh.com', 'https://baozimh.com'],
        searchPath: '/search?q=',
        listPaths: {
          recommend: '/',
          hot: '/classify?type=all&region=all&state=all&filter=click&page=1',
          finish: '/classify?type=all&region=all&state=pub&filter=*&page=1',
          serial: '/classify?type=all&region=all&state=serial&filter=*&page=1'
        },
        comicUrlPattern: /\/comic\//,

    var CORS_PROXIES = [
      function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
      function(url) { return 'https://corsproxy.io/?url=' + encodeURIComponent(url); },
      function(url) { return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url); },
      function(url) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(url); },
      function(url) { return 'https://api.whateverorigin.org/get?url=' + encodeURIComponent(url); }
    ];

    function log(msg) {
      debugLogs.push(msg);
      if (debugLogs.length > 50) debugLogs.shift();
      console.log('[漫画]', msg);

    function createTimeoutController(ms) {
      var controller = new AbortController();
      setTimeout(function() { controller.abort(); }, ms);
      return controller;
    }

    function parseHTML(htmlStr) {
      var parser = new DOMParser();
      return parser.parseFromString(htmlStr, 'text/html');
    }

    function getImgSrc(el) {
      if (!el) return '';
      return el.getAttribute('src') || el.getAttribute('data-src') || el.getAttribute('data-original') || el.getAttribute('data-lazy-src') || '';
    }

    function fixProxyUrl(url, baseUrl) {
      if (!url) return '';
      url = url.replace(/https?:\/\/api\.allorigins\.win/g, '');
      url = url.replace(/https?:\/\/corsproxy\.io\/?\?url=[^&]*/g, function(m) {
        try {
          var u = m.match(/url=([^&]+)/);
          return u ? decodeURIComponent(u[1]) : '';
        } catch(e) { return ''; }
      });
      url = url.replace(/https?:\/\/api\.codetabs\.com\/v1\/proxy\/\?quest=/g, '');
      url = url.replace(/https?:\/\/api\.whateverorigin\.org\/get\?url=/g, '');
      if (url && url.indexOf('http') !== 0 && url.charAt(0) === '/') {
        url = (baseUrl || '') + url;
      }
      return url;
    }

      var info = document.getElementById('sourceInfo');

        'Referer': referer || 'https://www.baozimh.com/',
        'Cache-Control': 'no-cache'
      };
    }

    async function fetchWithProxies(targetUrl, referer) {
      var errors = [];
      var proxyOrder = [];
      if (lastWorkingProxy >= 0) {
        proxyOrder.push(lastWorkingProxy);
        for (var p = 0; p < CORS_PROXIES.length; p++) {
          if (p !== lastWorkingProxy) proxyOrder.push(p);
        }
      } else {
        for (var q = 0; q < CORS_PROXIES.length; q++) proxyOrder.push(q);
      }

      for (var i = 0; i < proxyOrder.length; i++) {
        var proxyIdx = proxyOrder[i];
        var proxyUrl = CORS_PROXIES[proxyIdx](targetUrl);
        log('代理' + proxyIdx + ' 请求: ' + targetUrl.substring(0, 50));
        showSourceInfo('正在加载... (线路 ' + (i + 1) + '/' + proxyOrder.length + ')', 'loading');

        try {
          var controller = createTimeoutController(15000);
          var resp = await fetch(proxyUrl, { signal: controller.signal });
          if (!resp.ok) {
            errors.push('代理' + proxyIdx + ': HTTP ' + resp.status);
            continue;
          }
          var text = await resp.text();

          try {
            var json = JSON.parse(text);
            if (json && json.contents) text = json.contents;
            else if (json && json.data) text = typeof json.data === 'string' ? json.data : text;
            else if (json && json.html) text = json.html;
          } catch (e) {}

          if (text && text.length > 200 && (text.indexOf('<') !== -1 || text.indexOf('http') !== -1)) {
            log('代理' + proxyIdx + ' 成功!');
            lastWorkingProxy = proxyIdx;
            hideSourceInfo();
            return text;
          } else {
            errors.push('代理' + proxyIdx + ': 内容无效(' + (text ? text.length : 0) + '字节)');
          }
        } catch (e) {
          errors.push('代理' + proxyIdx + ': ' + e.message);
        }
      }
      throw new Error('所有代理均不可用\n\n' + errors.slice(0, 5).join('\n'));
    }

    function extractImagesFromScript(html) {
      var images = [];
      var imgUrlPattern = /"((?:https?:\/\/|\/\/)[^"']+\.(?:jpg|jpeg|png|webp|gif)(?:\?[^"']*)?)"/gi;
      var matches = html.match(imgUrlPattern);
      if (matches) {
        for (var i = 0; i < matches.length; i++) {
          var url = matches[i].replace(/^"|"$/g, '');
          if (url.indexOf('//') === 0) url = 'https:' + url;
          if (url.length > 30 && url.indexOf('logo') === -1 && url.indexOf('avatar') === -1 && url.indexOf('icon') === -1 && url.indexOf('placeholder') === -1) {
            images.push(url);
          }
        }
      }
      var jsonPatterns = [
        /window\.__NUXT__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /window\.__INITIAL_STATE__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /var\s+chapterImages\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+imageList\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+pageImages\s*=\s*\[([\s\S]*?)\]/i,
        /images\s*:\s*\[([\s\S]*?)\]/i
      ];
      for (var j = 0; j < jsonPatterns.length; j++) {
        var m = html.match(jsonPatterns[j]);
        if (m) {
          try {
            var urls = m[0].match(/https?:\/\/[^"'\s]+\.(jpg|jpeg|png|webp|gif)/gi);
            if (urls) {
              for (var k = 0; k < urls.length; k++) {
                if (urls[k].length > 30 && images.indexOf(urls[k]) === -1) {
                  images.push(urls[k]);
                }
              }
            }
          } catch (e) {}
        }
      }
      var uniqueImages = [];
      var seen = {};
      for (var u = 0; u < images.length; u++) {
        if (!seen[images[u]]) {
          seen[images[u]] = true;
          uniqueImages.push(images[u]);
        }
      }
      return uniqueImages;
    }

    function findElements(doc, selectors, minCount) {
      for (var i = 0; i < selectors.length; i++) {
        try {
          var found = doc.querySelectorAll(selectors[i]);
          if (found.length >= (minCount || 1)) {
            return found;
          }
        } catch (e) {}
      }
      return [];
    }

    function findFirstText(doc, selectors) {
      for (var i = 0; i < selectors.length; i++) {
        try {
          var el = doc.querySelector(selectors[i]);
          if (el && el.textContent.trim()) return el.textContent.trim();
        } catch (e) {}
      }
      return '';
    }

    // ==================== 漫画源管理 ====================
    function initSourceTabs() {
      var tabsEl = document.getElementById('sourceTabs');
      if (!tabsEl) return;
      var html = '';
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        var src = COMIC_SOURCES[i];
        var activeCls = (currentSource && currentSource.id === src.id) ? ' active' : '';
        html += '<div class="source-tab' + activeCls + '" data-id="' + src.id + '" onclick="switchSource(\'' + src.id + '\')">' +
                  '<span class="source-status" id="status-' + src.id + '"></span>' +
                  src.name +
                '</div>';
      }
      tabsEl.innerHTML = html;
      testAllSources();
    }

    function testAllSources() {
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        (function(idx) {
          var src = COMIC_SOURCES[idx];
          var dot = document.getElementById('status-' + src.id);
          if (dot) dot.className = 'source-status checking';

          var testUrl = src.domains[0] + src.listPaths.recommend;
          var controller = createTimeoutController(8000);
          fetch(CORS_PROXIES[0](testUrl), { signal: controller.signal })
            .then(function(r) {
              if (r.ok && dot) {
                dot.className = 'source-status ok';
                COMIC_SOURCES[idx].status = 'ok';
              } else if (dot) {
                dot.className = 'source-status error';
                COMIC_SOURCES[idx].status = 'error';
              }
            })
            .catch(function() {
              if (dot) dot.className = 'source-status error';
              COMIC_SOURCES[idx].status = 'error';
            });
        })(i);
      }
    }

    function switchSource(sourceId) {
      var src = null;
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].id === sourceId) {
          src = COMIC_SOURCES[i];
          break;
        }
      }
      if (!src) return;
      currentSource = src;
      currentDomainIndex = 0;

      var tabs = document.querySelectorAll('.source-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].classList.remove('active');
        if (tabs[t].getAttribute('data-id') === sourceId) {
          tabs[t].classList.add('active');
        }
      }

      log('切换到漫画源: ' + src.name);
      loadComicList('recommend');
    }

    function getFastestSource() {
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].status === 'ok') return COMIC_SOURCES[i];
      }
      return COMIC_SOURCES[0];
    }

    // ==================== 加载漫画列表 ====================
    async function loadComicList(type) {
      type = type || 'recommend';
      currentView = 'list';
      if (!currentSource) currentSource = getFastestSource();
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画列表...</p>' +
          '<p class="comic-loading-tips">来源: ' + src.name + '，请稍候</p>' +
        '</div>';

      var path = src.listPaths[type] || src.listPaths.recommend;
      var targetUrl = src.domains[currentDomainIndex] + path;

      try {
        var html = await fetchWithProxies(targetUrl, src.domains[0]);
        var doc = parseHTML(html);

        var cards = findElements(doc, src.selectors.card, 3);

        if (cards.length === 0) {
          var allLinks = doc.querySelectorAll('a[href*="' + src.comicUrlPattern.source.replace(/[\/\\\[\]\(\)]/g, function(c) { return c; }) + '"]');
          if (allLinks.length === 0) {
            allLinks = doc.querySelectorAll('a[href*="/comic"], a[href*="/manga"]');
          }
          log('备用方案: 找到' + allLinks.length + '个链接');
          var seenUrls = {};
          var tempCards = [];
          for (var al = 0; al < allLinks.length; al++) {
            var alHref = fixProxyUrl(allLinks[al].getAttribute('href'), src.domains[currentDomainIndex]);
            if (alHref && !seenUrls[alHref] && alHref.length > 10) {
              seenUrls[alHref] = true;
              var parent = allLinks[al].closest('div, li, article') || allLinks[al].parentElement;
              if (parent) tempCards.push(parent);
            }
          }
          if (tempCards.length >= 3) cards = tempCards;
        }

        if (cards.length === 0) {
          showErrorWithActions('未找到漫画数据', '请尝试切换其他漫画源', true);
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        var seenHrefs = {};
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a[href]');
          if (!link) continue;
          var href = fixProxyUrl(link.getAttribute('href'), src.domains[currentDomainIndex]);
          if (!href || href === '#' || seenHrefs[href]) continue;
          seenHrefs[href] = true;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4, [class*="name"]');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) {
              titleText = txt;
              break;
            }
          }
          if (!titleText && link) titleText = link.textContent.trim().substring(0, 30);

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);
          if (imgSrc) imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);

          var chapterEls = card.querySelectorAll('[class*="chapter"], em, [class*="subtitle"], [class*="info"]');
          var chapterText = '';
          for (var ch = 0; ch < chapterEls.length; ch++) {
            var chtxt = chapterEls[ch].textContent.trim();
            if (chtxt && chtxt.length > 1 && chtxt.length < 40) {
              chapterText = chtxt;
              break;
            }
          }

          if (href && titleText) {
            var safeHref = href.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var safeTitle = titleText.replace(/"/g, '&quot;');
            htmlStr +=
              '<div class="comic-card" onclick=\'loadComicDetail("' + safeHref + '","' + safeTitle + '")\'>' +
                (imgSrc ? '<img class="comic-card-img" src="' + imgSrc + '" alt="' + safeTitle + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' :
                 '<div class="comic-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>') +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + safeTitle + '</div>' +
                  (chapterText ? '<div class="comic-card-chapter">' + chapterText + '</div>' : '') +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        if (count === 0) {
          showErrorWithActions('未能解析漫画列表', '请尝试切换其他漫画源', true);
          return;
        }

        content.innerHTML = htmlStr;
        showSourceInfo('来源: ' + src.name + ' · 共 ' + count + ' 部', 'ok');
        log('加载 ' + count + ' 部漫画 (' + src.name + ')');
      } catch (e) {
        log('加载列表失败: ' + e.message);
        showErrorWithActions('加载失败', e.message, true, [
          { text: '重试', action: 'loadComicList(\'' + type + '\')' },
          { text: '切换源', action: 'tryNextSource(\'list\',\'' + type + '\')' }
        ]);
      }
    }

    function tryNextSource(viewType, param) {
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var idx = -1;
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].id === currentSource.id) {
          idx = i;
          break;
        }
      }
      var nextIdx = (idx + 1) % COMIC_SOURCES.length;
      currentSource = COMIC_SOURCES[nextIdx];
      currentDomainIndex = 0;

      var tabs = document.querySelectorAll('.source-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].classList.remove('active');
        if (tabs[t].getAttribute('data-id') === currentSource.id) {
          tabs[t].classList.add('active');
        }
      }

      log('自动切换到: ' + currentSource.name);
      if (viewType === 'list') loadComicList(param || 'recommend');
      else if (viewType === 'search') searchComic(param);
      else if (viewType === 'detail') loadComicDetail(currentComicUrl, currentComicTitle);

    async function searchComic(keyword) {
      currentView = 'list';
      if (!currentSource) currentSource = getFastestSource();
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +

        '</div>';

      try {
        var searchUrl = src.domains[currentDomainIndex] + src.searchPath + encodeURIComponent(keyword);
        var html = await fetchWithProxies(searchUrl, src.domains[0]);
        var doc = parseHTML(html);

        var cards = findElements(doc, src.selectors.card, 1);

        if (cards.length === 0) {
          var allLinks = doc.querySelectorAll('a[href*="/comic"], a[href*="/manga"]');
          var seenUrls = {};
          var tempCards = [];
          for (var al = 0; al < allLinks.length; al++) {
            var alHref = fixProxyUrl(allLinks[al].getAttribute('href'), src.domains[currentDomainIndex]);
            if (alHref && !seenUrls[alHref] && alHref.length > 10) {
              seenUrls[alHref] = true;
              var parent = allLinks[al].closest('div, li, article') || allLinks[al].parentElement;
              if (parent) tempCards.push(parent);
            }
          }
          if (tempCards.length >= 1) cards = tempCards;
        }

        if (cards.length === 0) {
          content.innerHTML =
            '<div class="comic-error">' +
              '<i data-lucide="search-x"></i>' +
              '<p>未找到 "' + keyword + '" 相关漫画</p>' +
              '<div class="comic-error-actions">' +
                '<button class="comic-error-btn primary" onclick="tryNextSource(\'search\',\'' + keyword.replace(/'/g, "\\'") + '\')">' +
                  '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>换源搜索' +
                '</button>' +
                '<button class="comic-error-btn" onclick="loadComicList(\'recommend\')">' +
                  '<i data-lucide="arrow-left" style="width:14px;height:14px;"></i>返回' +
                '</button>' +
              '</div>' +
            '</div>';
          lucide.createIcons();
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        var seenHrefs = {};
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a[href]');
          if (!link) continue;
          var href = fixProxyUrl(link.getAttribute('href'), src.domains[currentDomainIndex]);
          if (!href || href === '#' || seenHrefs[href]) continue;
          seenHrefs[href] = true;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4, [class*="name"]');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) { titleText = txt; break; }
          }
          if (!titleText && link) titleText = link.textContent.trim().substring(0, 30);

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);
          if (imgSrc) imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);

          if (href && titleText) {
            var safeHref = href.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var safeTitle = titleText.replace(/"/g, '&quot;');
            htmlStr +=
              '<div class="comic-card" onclick=\'loadComicDetail("' + safeHref + '","' + safeTitle + '")\'>' +
                (imgSrc ? '<img class="comic-card-img" src="' + imgSrc + '" alt="' + safeTitle + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' :
                 '<div class="comic-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>') +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + safeTitle + '</div>' +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        content.innerHTML = htmlStr;
        showSourceInfo('来源: ' + src.name + ' · 找到 ' + count + ' 个结果', 'ok');
      } catch (e) {
        showErrorWithActions('搜索失败', e.message, true, [
          { text: '换源搜索', action: 'tryNextSource(\'search\',\'' + keyword.replace(/'/g, "\\'") + '\')' },
          { text: '返回', action: 'loadComicList(\'recommend\')' }
        ]);
      }
    }

    // ==================== 漫画详情 ====================
    async function loadComicDetail(comicUrl, fallbackTitle) {
      currentView = 'detail';
      currentComicUrl = comicUrl;
      currentComicTitle = fallbackTitle || '';
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画详情...</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchWithProxies(comicUrl, src.domains[0]);
        var doc = parseHTML(html);

        var titleText = findFirstText(doc, src.selectors.title) || fallbackTitle || '未知漫画';
        var authorText = findFirstText(doc, src.selectors.author);
        var descText = findFirstText(doc, src.selectors.desc);

        var coverSrc = '';
        for (var ci = 0; ci < src.selectors.cover.length; ci++) {
          var cel = doc.querySelector(src.selectors.cover[ci]);
          if (cel) {
            coverSrc = getImgSrc(cel);
            if (coverSrc) {
              coverSrc = fixProxyUrl(coverSrc, src.domains[currentDomainIndex]);
              break;
            }
          }
        }

        var tagsHtml = '';
        var tagContainer = doc.querySelector('[class*="tag"]:not([class*="nav"]):not(nav), .tags, .tag-list');
        if (tagContainer) {
          var tags = tagContainer.querySelectorAll('span, a');
          for (var ti = 0; ti < tags.length; ti++) {
            var ttxt = tags[ti].textContent.trim();
            if (ttxt && ttxt.length >= 2 && ttxt.length < 15) {
              tagsHtml += '<span class="comic-detail-tag">' + ttxt + '</span>';
            }
          }
        }

        var chapterLinks = findElements(doc, src.selectors.chapters, 3);

        if (chapterLinks.length < 3) {
          var allLinks = doc.querySelectorAll('a[href]');
          var seenCh = {};
          for (var al2 = 0; al2 < allLinks.length; al2++) {
            var hr = fixProxyUrl(allLinks[al2].getAttribute('href'), src.domains[currentDomainIndex]);
            var txt = allLinks[al2].textContent.trim();
            if (hr && txt && (hr.indexOf('chapter') !== -1 || hr.indexOf('read') !== -1 || hr.match(/\d+\.html/)) && txt.length < 30) {
              if (!seenCh[hr]) {
                seenCh[hr] = true;
              }
            }
          }
        }

        currentChapters = [];
        var seenChapterUrls = {};
        for (var cl = 0; cl < chapterLinks.length; cl++) {
          var chLink = chapterLinks[cl];
          var chref = fixProxyUrl(chLink.getAttribute('href'), src.domains[currentDomainIndex]);
          var chtext = chLink.textContent.trim();
          if (chref && chtext && !seenChapterUrls[chref] && chtext.length < 50) {
            seenChapterUrls[chref] = true;
            currentChapters.push({ url: chref, title: chtext });
          }
        }

        if (currentChapters.length > 2) {
          var firstNum = currentChapters[0].title.match(/\d+/);
          var lastNum = currentChapters[currentChapters.length - 1].title.match(/\d+/);
          if (firstNum && lastNum && parseInt(firstNum[0]) > parseInt(lastNum[0])) {
            currentChapters.reverse();
          }
        }

        var chapterHtml = '';
        for (var ch = 0; ch < currentChapters.length; ch++) {
          chapterHtml += '<div class="chapter-item" onclick="loadChapter(' + ch + ')">' + currentChapters[ch].title + '</div>';
        }

        var safeTitle = titleText.replace(/"/g, '&quot;');
        var chapterSearchHtml =
          '<div class="chapter-toolbar">' +
            '<div class="chapter-search-wrap">' +
              '<i data-lucide="search" style="width:14px;height:14px;"></i>' +
              '<input type="text" class="chapter-search-input" placeholder="搜索章节..." oninput="filterChapters(this.value)">' +
            '</div>' +
            '<div class="chapter-quick-actions">' +
              '<button onclick="loadChapter(0)" title="第一话"><i data-lucide="chevrons-left" style="width:14px;height:14px;"></i></button>' +
              '<button onclick="scrollToCurrentChapter()" title="当前话"><i data-lucide="circle-dot" style="width:14px;height:14px;"></i></button>' +
              '<button onclick="loadChapter(currentChapters.length-1)" title="最后一话"><i data-lucide="chevrons-right" style="width:14px;height:14px;"></i></button>' +
            '</div>' +
          '</div>';

        var chapterHtml = generateChapterList(currentChapters);

        content.innerHTML =
          '<div class="comic-detail">' +
            '<button class="comic-back-btn" onclick="goBackToList()">' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回列表' +
            '</button>' +
            '<div class="comic-detail-header">' +
              (coverSrc ? '<img class="comic-detail-cover" src="' + coverSrc + '" alt="' + safeTitle + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' : '') +
              '<div class="comic-detail-meta">' +
                '<div class="comic-detail-title">' + safeTitle + '</div>' +
                (authorText ? '<div class="comic-detail-author">' + authorText + '</div>' : '') +
                '<div class="comic-detail-tags">' + tagsHtml + '</div>' +
                (descText ? '<div class="comic-detail-desc">' + descText.substring(0, 200) + '</div>' : '') +
              '</div>' +
            '</div>' +
            '<h3 style="font-size:1.05rem;margin-bottom:12px;color:var(--text-primary);">章节列表 (' + currentChapters.length + '话)</h3>' +
            chapterSearchHtml +
            '<div class="chapter-list" id="chapterList">' + chapterHtml + '</div>' +
          '</div>';
        lucide.createIcons();
      } catch (e) {
        showErrorWithActions('加载详情失败', e.message, true, [
          { text: '重试', action: 'loadComicDetail("' + comicUrl.replace(/'/g, "\\'") + '", "' + (fallbackTitle || '').replace(/'/g, "\\'") + '")' },
          { text: '换源', action: 'tryNextSourceChapter()' },
          { text: '返回列表', action: 'goBackToList()' }
        ]);
      }
    }

    // ==================== 阅读器 ====================
    async function loadChapter(index) {
      currentView = 'reader';
      currentChapterIndex = index;
      var chapter = currentChapters[index];
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载章节...</p>' +
          '<p class="comic-loading-tips">' + chapter.title + '</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchWithProxies(chapter.url, src.domains[0]);
        var doc = parseHTML(html);

        var images = [];

        var scriptImages = extractImagesFromScript(html);
        var hasWatermark = true;

        if (scriptImages.length >= 5) {
          log('从脚本数据提取 ' + scriptImages.length + ' 张图片');
          images = scriptImages;
          hasWatermark = false;
        } else {
          var containerSelectors = src.selectors.images || ['.comic-content', 'article'];
          for (var cs = 0; cs < containerSelectors.length; cs++) {
            var container = doc.querySelector(containerSelectors[cs]);
            if (container) {
              var imgs = container.querySelectorAll('amp-img, img');
              for (var i = 0; i < imgs.length; i++) {
                var imgsrc = getImgSrc(imgs[i]);
                imgsrc = imgsrc ? fixProxyUrl(imgsrc, src.domains[currentDomainIndex]) : '';
                if (imgsrc && imgsrc.indexOf('http') === 0 && !imgsrc.match(/\.(js|css|ico|svg)$/i) && imgsrc.indexOf('placeholder') === -1 && imgsrc.indexOf('avatar') === -1 && imgsrc.indexOf('logo') === -1 && imgsrc.indexOf('icon') === -1 && imgsrc.length > 30) {
                  images.push(imgsrc);
                }
              }
              if (images.length >= 3) {
                log('找到图片容器: ' + containerSelectors[cs] + ' (' + images.length + '张)');
                break;
              }
            }
          }

          if (images.length < 3) {
            var allImgs = doc.querySelectorAll('img[src*="http"], amp-img[src*="http"]');
            for (var ai = 0; ai < allImgs.length; ai++) {
              var asrc = getImgSrc(allImgs[ai]);
              asrc = asrc ? fixProxyUrl(asrc, src.domains[currentDomainIndex]) : '';
              if (asrc && asrc.indexOf('http') === 0 && !asrc.match(/\.(js|css|ico|svg)$/i) && asrc.indexOf('placeholder') === -1 && asrc.indexOf('avatar') === -1 && asrc.indexOf('logo') === -1 && asrc.indexOf('icon') === -1 && asrc.length > 30) {
                if (images.indexOf(asrc) === -1) images.push(asrc);
              }
            }
          }
        }

        var prevBtn = index > 0
          ? '<button onclick="loadChapter(' + (index - 1) + ')"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>'
          : '<button disabled><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>';
        var nextBtn = index < currentChapters.length - 1
          ? '<button onclick="loadChapter(' + (index + 1) + ')">下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>'
          : '<button disabled>下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>';

        var watermarkBadge = hasWatermark
          ? '<span class="watermark-badge watermarked"><i data-lucide="droplet" style="width:10px;height:10px;"></i>可能有水印</span>'
          : '<span class="watermark-badge clean"><i data-lucide="check" style="width:10px;height:10px;"></i>纯净无水印</span>';

        var imagesHtml = '';
        for (var img = 0; img < images.length; img++) {
          var fixedUrl = fixProxyUrl(images[img], src.domains[currentDomainIndex]);
          if (fixedUrl.indexOf('//') === 0) fixedUrl = 'https:' + fixedUrl;
          imagesHtml +=
            '<div class="comic-image-wrap" data-src="' + fixedUrl + '" data-backup-src="" data-index="' + img + '">' +
              '<img src="' + fixedUrl + '" alt="第' + (img + 1) + '页" referrerpolicy="no-referrer" loading="lazy" ' +
                   'onerror="retryComicImage(this)" ' +
                   'style="width:100%;display:block;">' +
              '<div class="comic-image-placeholder" style="display:none;">' +
                '<span class="mini-spinner"></span>加载中...' +
              '</div>' +
            '</div>';
        }

        var safeUrl = currentComicUrl.replace(/'/g, "\\'");
        var safeTitle = (currentComicTitle || '').replace(/"/g, '&quot;');
        content.innerHTML =
          '<div class="comic-reader">' +
            '<button class="comic-back-btn" onclick=\'loadComicDetail("' + safeUrl + '", "' + safeTitle + '")\'>' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回详情' +
            '</button>' +
            '<div class="comic-reader-title">' +
              chapter.title +
              '<div style="margin-top:8px;display:flex;justify-content:center;gap:8px;">' + watermarkBadge +
                '<span class="watermark-badge" style="background:rgba(99,102,241,0.15);color:var(--accent-primary);">来源: ' + src.name + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="comic-reader-nav">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
            '<div class="comic-reader-images">' +
              (imagesHtml || '<p style="text-align:center;color:var(--text-muted);padding:40px;">本章节暂无图片数据</p>') +
            '</div>' +
            '<div class="comic-reader-nav" style="margin-top:24px;">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
          '</div>';
        lucide.createIcons();
      } catch (e) {
        showErrorWithActions('加载章节失败', e.message, true, [
          { text: '重试', action: 'loadChapter(' + index + ')' },
          { text: '返回详情', action: 'loadComicDetail(currentComicUrl, currentComicTitle)' }
        ]);
      }
    }

    // ==================== 章节列表管理 ====================
    function generateChapterList(chapters) {
      if (!chapters || chapters.length === 0) return '';

      var grouped = {};
      for (var i = 0; i < chapters.length; i++) {
        var title = chapters[i].title;
        var groupKey = '其他';
        if (title.match(/第[\d一二三四五六七八九十百]+话/)) groupKey = '正篇';
        else if (title.match(/番外|特别篇|SP/)) groupKey = '番外';
        else if (title.match(/序章|序幕|引子/)) groupKey = '序章';
        else if (title.match(/外传/)) groupKey = '外传';
        else if (title.match(/第[\d一二三四五六七八九十百]+卷/)) groupKey = '单行本';
        else if (title.match(/第[\d一二三四五六七八九十百]+季/)) groupKey = '分季';
        else if (title.match(/OVA|OAD/)) groupKey = 'OVA';

        if (!grouped[groupKey]) grouped[groupKey] = [];
        grouped[groupKey].push({ index: i, title: title });
      }

      var html = '';
      var groupOrder = ['序章', '正篇', '番外', '外传', '单行本', '分季', 'OVA', '其他'];

      for (var g = 0; g < groupOrder.length; g++) {
        var groupName = groupOrder[g];
        if (!grouped[groupName]) continue;

        var items = grouped[groupName];
        html += '<div class="chapter-group">' +
                  '<div class="chapter-group-header" onclick="toggleChapterGroup(this)">' +
                    '<i data-lucide="chevron-right" class="group-toggle-icon" style="width:14px;height:14px;"></i>' +
                    '<span>' + groupName + '</span>' +
                    '<span class="group-count">(' + items.length + ')</span>' +
                  '</div>' +
                  '<div class="chapter-group-content">';

        for (var j = 0; j < items.length; j++) {
          var isCurrent = items[j].index === currentChapterIndex;
          html += '<div class="chapter-item' + (isCurrent ? ' current' : '') + '" onclick="loadChapter(' + items[j].index + ')">' + items[j].title + '</div>';
        }

        html += '</div></div>';
      }

      return html;
    }

    function toggleChapterGroup(header) {
      var content = header.nextElementSibling;
      var icon = header.querySelector('.group-toggle-icon');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.style.transform = 'rotate(90deg)';
      } else {
        content.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
      }
    }

    function filterChapters(keyword) {
      var chapterList = document.getElementById('chapterList');
      if (!chapterList) return;

      var groups = chapterList.querySelectorAll('.chapter-group');
      var keywordLower = keyword.toLowerCase().trim();

      for (var g = 0; g < groups.length; g++) {
        var group = groups[g];
        var items = group.querySelectorAll('.chapter-item');
        var hasMatch = false;

        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var title = item.textContent.toLowerCase();
          if (title.indexOf(keywordLower) !== -1) {
            item.style.display = 'block';
            hasMatch = true;
          } else {
            item.style.display = 'none';
          }
        }

        var header = group.querySelector('.chapter-group-header');
        var content = group.querySelector('.chapter-group-content');
        if (hasMatch) {
          group.style.display = 'block';
          content.style.display = 'block';
          header.querySelector('.group-toggle-icon').style.transform = 'rotate(90deg)';
        } else {
          group.style.display = 'none';
        }
      }
    }

    function scrollToCurrentChapter() {
      var currentItem = document.querySelector('.chapter-item.current');
      if (currentItem) {
        currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        currentItem.style.backgroundColor = 'var(--accent-primary)';
        currentItem.style.color = '#fff';
        setTimeout(function() {
          currentItem.style.backgroundColor = '';
          currentItem.style.color = '';
        }, 2000);
      }
    }
    var CORS_IMAGE_PROXIES = [
      'https://images.weserv.nl/?url=',
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
      'https://cors-anywhere.herokuapp.com/'
    ];

    function retryComicImage(img) {
      var wrap = img.parentElement;
      if (!wrap) return;

      var originalSrc = wrap.getAttribute('data-src');
      var backupSrc = wrap.getAttribute('data-backup-src');
      var retryCount = parseInt(wrap.getAttribute('data-retry-count') || '0');

      if (retryCount >= 3) {
        img.style.display = 'none';
        var placeholder = wrap.querySelector('.comic-image-placeholder');
        if (placeholder) {
          placeholder.textContent = '加载失败，点击重试';
          placeholder.style.display = 'flex';
          placeholder.onclick = function() {
            wrap.setAttribute('data-retry-count', '0');
            img.style.display = 'block';
            img.src = originalSrc;
            placeholder.style.display = 'none';
          };
        }
        return;
      }

      retryCount++;
      wrap.setAttribute('data-retry-count', retryCount.toString());

      var proxyUrl = CORS_IMAGE_PROXIES[(retryCount - 1) % CORS_IMAGE_PROXIES.length];
      var newSrc = proxyUrl + encodeURIComponent(originalSrc);

      log('图片重试 (' + retryCount + ') 使用代理: ' + newSrc.substring(0, 60));
      img.src = newSrc;
    }
    function showErrorWithActions(title, detail, showDetail, actions) {
      var content = document.getElementById('comicContent');
      showSourceInfo('加载失败', 'error');

      var actionsHtml = '';
      if (actions && actions.length > 0) {
        actionsHtml = '<div class="comic-error-actions">';
        for (var i = 0; i < actions.length; i++) {
          var btnClass = i === 0 ? 'comic-error-btn primary' : 'comic-error-btn';
          actionsHtml += '<button class="' + btnClass + '" onclick="' + actions[i].action + '">' + actions[i].text + '</button>';
        }
        actionsHtml += '</div>';
      } else {
        actionsHtml =
          '<div class="comic-error-actions">' +
            '<button class="comic-error-btn primary" onclick="loadComicList(\'recommend\')">' +
              '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>重新加载' +
            '</button>' +
          '</div>';
      }

      var detailHtml = '';
      if (showDetail && detail) {
        detailHtml = '<div class="comic-error-detail">' + (detail.substring(0, 500)) + '</div>';
      }

      content.innerHTML =
        '<div class="comic-error">' +
          '<i data-lucide="wifi-off"></i>' +
          '<p>' + title + '</p>' +
          '<p style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;">建议切换其他漫画源试试</p>' +
          actionsHtml +
          detailHtml +
        '</div>';
      lucide.createIcons();
    }

    // ==================== 导航 ====================
    function goBackToList() {
      currentView = 'list';
      var activeTag = document.querySelector('.comic-tag.active');
      loadComicList(activeTag ? activeTag.dataset.type : 'recommend');
    }

    var tagElements = document.querySelectorAll('.comic-tag');
    for (var ti = 0; ti < tagElements.length; ti++) {
      tagElements[ti].addEventListener('click', function() {
        var allTags = document.querySelectorAll('.comic-tag');
        for (var at = 0; at < allTags.length; at++) {
          allTags[at].classList.remove('active');
        }
        this.classList.add('active');
        loadComicList(this.dataset.type);
      });
    }

    // ==================== 初始化 ====================
    initSourceTabs();
    currentSource = COMIC_SOURCES[0];
    lucide.createIcons();
    log('漫画模块初始化完成');

    setTimeout(function() {
      if (currentSource) {
        loadComicList('recommend');
      }
