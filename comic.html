<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>漫画 | 蘇魚</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0" defer onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js';"></script>
  <link rel="stylesheet" href="style.css">
  <meta name="referrer" content="no-referrer">
  <style>
    .comic-page {
      min-height: 100vh;
      padding-top: 80px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .comic-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .comic-header h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comic-header h1 .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gradient-short);
      color: #fff;
      font-weight: 500;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-home:hover {
      border-color: var(--accent-primary);
      transform: translateX(-2px);
    }

    .comic-search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .comic-search-wrap {
      display: flex;
      gap: 10px;
      max-width: 500px;
    }

    .comic-search-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .comic-search-input:focus {
      border-color: var(--accent-primary);
    }

    .comic-search-input::placeholder {
      color: var(--text-muted);
    }

    .comic-search-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .comic-search-btn:hover {
      transform: scale(1.03);
    }

    .comic-search-btn:active {
      transform: scale(0.98);
    }

    .comic-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .comic-tag {
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .comic-tag:hover,
    .comic-tag.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .comic-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      transition: all 0.3s;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .comic-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: var(--bg-tertiary);
      display: block;
    }

    .comic-card-info {
      padding: 10px 12px;
    }

    .comic-card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-card-chapter {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .comic-loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .comic-loading-tips {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .comic-error {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .comic-error svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }

    .comic-error-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .comic-error-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-error-btn:hover {
      border-color: var(--accent-primary);
    }

    .comic-error-btn.primary {
      background: var(--gradient-short);
      color: #fff;
      border-color: transparent;
    }

    .comic-error-detail {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      max-height: 150px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .comic-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comic-detail-cover {
      width: 140px;
      height: 190px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .comic-detail-meta {
      flex: 1;
      min-width: 200px;
    }

    .comic-detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .comic-detail-author {
      font-size: 0.95rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .comic-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .comic-detail-tag {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .comic-detail-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .comic-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .comic-back-btn:hover {
      border-color: var(--accent-primary);
    }

    .chapter-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .chapter-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      font-size: 0.88rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-reader {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-reader-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .comic-reader-images {
      display: flex;
      flex-direction: column;
      gap: 0;
      will-change: transform;
      -webkit-overflow-scrolling: touch;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
      margin: 0;
      padding: 0;
      will-change: transform;
    }

    .comic-reader-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .comic-reader-nav button {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-reader-nav button:hover:not(:disabled) {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: #fff;
    }

    .comic-reader-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .comic-reader-nav .nav-center {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .source-info {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-info .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .source-info .source-dot.loading {
      background: #f59e0b;
    }

    .source-info .source-dot.error {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 768px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .comic-card-info {
        padding: 8px 10px;
      }

      .comic-card-title {
        font-size: 0.82rem;
      }

      .comic-card-chapter {
        font-size: 0.72rem;
      }

      .comic-header h1 {
        font-size: 1.3rem;
      }

      .comic-detail-cover {
        width: 100px;
        height: 135px;
      }

      .comic-detail-title {
        font-size: 1.15rem;
      }

      .chapter-list {
        grid-template-columns: 1fr;
      }

      .comic-search-wrap {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .comic-header {
        padding: 16px 14px 12px;
      }

      .comic-search-bar,
      .comic-tags,
      .comic-grid,
      .comic-detail,
      .comic-reader,
      .source-info {
        padding-left: 14px;
        padding-right: 14px;
      }

      .comic-card-title {
        font-size: 0.76rem;
      }
    }

    .source-selector {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-selector-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .source-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .source-tab {
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .source-tab:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .source-tab.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .source-tab .source-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .source-tab .source-status.ok {
      background: #22c55e;
    }

    .source-tab .source-status.checking {
      background: #f59e0b;
      animation: pulse 1s ease-in-out infinite;
    }

    .source-tab .source-status.error {
      background: #ef4444;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
      margin: 0;
      padding: 0;
    }

    .comic-image-wrap {
      width: 100%;
      position: relative;
      background: var(--bg-tertiary);
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .comic-image-wrap img {
      width: 100%;
      display: block;
    }

    .comic-image-wrap img + .comic-image-placeholder {
      display: none;
    }

    .comic-image-placeholder {
      position: absolute;
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .comic-image-placeholder .mini-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .watermark-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .watermark-badge.clean {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .watermark-badge.watermarked {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .chapter-toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chapter-search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--bg-tertiary);
      color: var(--text-muted);
    }

    .chapter-search-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    .chapter-search-input::placeholder {
      color: var(--text-muted);
    }

    .chapter-quick-actions {
      display: flex;
      gap: 6px;
    }

    .chapter-quick-actions button {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chapter-quick-actions button:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .chapter-group {
      margin-bottom: 8px;
    }

    .chapter-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .chapter-group-header:hover {
      background: var(--bg-tertiary);
    }

    .group-toggle-icon {
      transition: transform 0.2s;
      color: var(--text-muted);
    }

    .group-count {
      margin-left: auto;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .chapter-group-content {
      padding-left: 20px;
      margin-top: 4px;
    }

    .chapter-item.current {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-primary);
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .source-selector {
        padding: 0 14px;
      }
      .source-tab {
        padding: 5px 10px;
        font-size: 0.78rem;
      }
    }

    /* ==================== 离线下载 UI ==================== */
    .offline-library-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--gradient-short);
      border: none;
      color: #fff;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .offline-library-btn:hover {
      transform: scale(1.03);
      opacity: 0.92;
    }

    .comic-download-section {
      margin-bottom: 20px;
    }

    .download-comic-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px dashed var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
      color: var(--accent-primary);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .download-comic-btn:hover {
      background: rgba(99, 102, 241, 0.15);
      transform: translateY(-1px);
    }

    .download-comic-btn:active {
      transform: scale(0.98);
    }

    .comic-downloaded-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      font-size: 0.9rem;
      color: #22c55e;
    }

    .comic-downloaded-badge span {
      flex: 1;
    }

    .remove-download-btn {
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid rgba(239, 68, 68, 0.4);
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .remove-download-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .download-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .download-overlay.active {
      display: flex;
    }

    .download-panel {
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    .download-panel h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .download-comic-name {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 20px;
      word-break: break-all;
    }

    .download-progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;

      var timer = null;
      return function() {
        var args = arguments;
        if (timer) clearTimeout(timer);
        timer = setTimeout(function() { fn.apply(this, args); }, delay);
      };
    }

    function throttle(fn, limit) {
      var inThrottle = false;
      return function() {
        var args = arguments;
        if (!inThrottle) {
          fn.apply(this, args);
          inThrottle = true;
          setTimeout(function() { inThrottle = false; }, limit);

      var type = e.type;
      if (!eventHandlers[type]) return;

      var target = e.target;
      while (target) {
        for (var i = 0; i < eventHandlers[type].length; i++) {
          var h = eventHandlers[type][i];
          if (target.matches && target.matches(h.selector)) {
            h.handler.call(target, e);
            return;
          }
        }
        target = target.parentElement;
      }
    }

    var offlineLibrary = {};

    // ==================== IndexedDB 持久化 ====================
    var DB_NAME = 'suyu-comic-db';
    var DB_VERSION = 1;
    var STORE_NAME = 'comics';
    var idbReady = false;

    function openIDB() {
      return new Promise(function(resolve, reject) {
        if (!window.indexedDB) { reject(new Error('IndexedDB 不支持')); return; }
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function(e) {
          var db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'comicUrl' });
          }
        };
        req.onsuccess = function(e) { idbReady = true; resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }

    function idbPut(comicData) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          // 将 blobUrl 转为 Blob 存储（IndexedDB 可直接存 Blob）
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          store.put(comicData);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbGet(comicUrl) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.get(comicUrl);
          req.onsuccess = function(e) { resolve(e.target.result); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbGetAll() {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.getAll();
          req.onsuccess = function(e) { resolve(e.target.result || []); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function idbDelete(comicUrl) {
      return openIDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          store.delete(comicUrl);
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

      if (!blobUrl || blobUrl.indexOf('blob:') !== 0) return Promise.resolve(blobUrl);
      return fetch(blobUrl).then(function(r) { return r.blob(); });

          for (var c = 0; c < rec.chapters.length; c++) {

        }
        var count = Object.keys(offlineLibrary).length;

    function fixProxyUrl(url, baseUrl) {
      if (!url) return '';
      url = url.replace(/https?:\/\/api\.allorigins\.win/g, '');
      url = url.replace(/https?:\/\/corsproxy\.io\/?\?url=[^&]*/g, function(m) {
        try {
          var u = m.match(/url=([^&]+)/);
          return u ? decodeURIComponent(u[1]) : '';

      });
      url = url.replace(/https?:\/\/api\.codetabs\.com\/v1\/proxy\/\?quest=/g, '');
      url = url.replace(/https?:\/\/api\.whateverorigin\.org\/get\?url=/g, '');
      if (url && url.indexOf('http') !== 0 && url.charAt(0) === '/') {

    async function fetchWithProxies(targetUrl, referer) {
      showSourceInfo('正在加载... (竞速模式)', 'loading');

      // 竞速模式：同时发起所有代理请求，取第一个成功的
      var controllers = [];
      var promises = CORS_PROXIES.map(function(proxyFn, proxyIdx) {
        var controller = createTimeoutController(12000);
        controllers.push(controller);
        return fetch(proxyFn(targetUrl), { signal: controller.signal })
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.text();
          })
          .then(function(text) {
            // 解析 JSON 包裹
            try {
              var json = JSON.parse(text);
              if (json && json.contents) text = json.contents;
              else if (json && json.data) text = typeof json.data === 'string' ? json.data : text;
              else if (json && json.html) text = json.html;
            } catch (e) {}

            if (text && text.length > 200 && (text.indexOf('<') !== -1 || text.indexOf('http') !== -1)) {
              return { text: text, proxyIdx: proxyIdx };
            }
            throw new Error('内容无效');
          });
      });

      try {
        var result = await Promise.any(promises);
        log('代理' + result.proxyIdx + ' 竞速胜出!');
        lastWorkingProxy = result.proxyIdx;
        hideSourceInfo();
        // 中断其他请求
        for (var c = 0; c < controllers.length; c++) {
          try { controllers[c].abort(); } catch(e) {}
        }
        return result.text;
      } catch(e) {
        hideSourceInfo();
        throw new Error('所有代理均不可用');
      }
    }

    function extractImagesFromScript(html) {
      var images = [];
      var imgUrlPattern = /"((?:https?:\/\/|\/\/)[^"']+\.(?:jpg|jpeg|png|webp|gif)(?:\?[^"']*)?)"/gi;
      var matches = html.match(imgUrlPattern);
      if (matches) {
        for (var i = 0; i < matches.length; i++) {
          var url = matches[i].replace(/^"|"$/g, '');
          if (url.indexOf('//') === 0) url = 'https:' + url;
          if (url.length > 30 && url.indexOf('logo') === -1 && url.indexOf('avatar') === -1 && url.indexOf('icon') === -1 && url.indexOf('placeholder') === -1) {
            images.push(url);
          }
        }
      }
      var jsonPatterns = [
        /window\.__NUXT__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /window\.__INITIAL_STATE__\s*=\s*([\s\S]*?);?\s*<\/script>/i,
        /var\s+chapterImages\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+imageList\s*=\s*\[([\s\S]*?)\]/i,
        /var\s+pageImages\s*=\s*\[([\s\S]*?)\]/i,
        /images\s*:\s*\[([\s\S]*?)\]/i
      ];
      for (var j = 0; j < jsonPatterns.length; j++) {
        var m = html.match(jsonPatterns[j]);
        if (m) {
          try {
            var urls = m[0].match(/https?:\/\/[^"'\s]+\.(jpg|jpeg|png|webp|gif)/gi);
            if (urls) {
              for (var k = 0; k < urls.length; k++) {
                if (urls[k].length > 30 && images.indexOf(urls[k]) === -1) {
                  images.push(urls[k]);
                }
              }
            }
          } catch (e) {}
        }
      }
      var uniqueImages = [];
      var seen = {};
      for (var u = 0; u < images.length; u++) {
        if (!seen[images[u]]) {
          seen[images[u]] = true;
          uniqueImages.push(images[u]);
        }
      }
      return uniqueImages;
    }

    // ==================== 章节排序 ====================
    function getChapterSortKey(title) {
      if (!title) return Infinity;

      var chineseMap = {'零':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100,'千':1000};

      function chineseStrToNum(s) {
        if (/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
        if (!s) return NaN;
        if (s.length === 1) return chineseMap[s] !== undefined ? chineseMap[s] : NaN;
        if (s[0] === '十') { var r = chineseStrToNum(s.slice(1)); return 10 + (isNaN(r) ? 0 : r); }
        if (s[s.length - 1] === '十') { var f = chineseStrToNum(s.slice(0, -1)); return isNaN(f) ? 10 : f * 10; }
        if (s.indexOf('十') !== -1) {
          var parts = s.split('十');
          var a = parts[0] ? chineseStrToNum(parts[0]) : 0;
          var b = parts[1] ? chineseStrToNum(parts[1]) : 0;
          return (isNaN(a) || isNaN(b)) ? NaN : a * 10 + b;
        }
        if (s.indexOf('百') !== -1) {
          var parts2 = s.split('百');
          var a2 = parts2[0] ? chineseStrToNum(parts2[0]) : 1;
          var b2 = parts2[1] ? chineseStrToNum(parts2[1]) : 0;
          return (isNaN(a2) || isNaN(b2)) ? NaN : a2 * 100 + b2;
        }
        return NaN;
      }

      var patterns = [
        /第\s*([\d.]+)\s*[话回章节篇卷集]/,
        /第\s*([一二三四五六七八九十百千零两\d.]+)\s*[话回章节篇卷集]/,
        /chapter\s*([\d.]+)/i,
        /(?:^|[\s(\[【（])\s*(\d+(?:\.\d+)?)\s*(?:[话回章节篇卷集]?)/,
        /([\d.]+)/
      ];

      for (var i = 0; i < patterns.length; i++) {
        var m = title.match(patterns[i]);
        if (m) {
          var num = chineseStrToNum(m[1]);
          if (!isNaN(num)) return num;
        }
      }
      return Infinity;
    }

    function sortChapters(chapters) {
      if (!chapters || chapters.length <= 1) return;
      for (var i = 0; i < chapters.length; i++) {

      }
      chapters.sort(function(a, b) { return a._sortKey - b._sortKey; });
      for (var j = 0; j < chapters.length; j++) {
        delete chapters[j]._sortKey;
      }
    }

              if (imgsrc && imgsrc.indexOf('http') === 0 && !imgsrc.match(/\.(js|css|ico|svg)$/i) && imgsrc.indexOf('placeholder') === -1 && imgsrc.indexOf('avatar') === -1 && imgsrc.indexOf('logo') === -1 && imgsrc.indexOf('icon') === -1 && imgsrc.length > 30) {

            }
            if (images.length >= 3) {
              log('找到图片容器: ' + containerSelectors[cs] + ' (' + images.length + '张)');
              break;
            }
          }
        }
        if (images.length < 3) {
          var allImgs = doc.querySelectorAll('img[src*="http"], amp-img[src*="http"]');
          for (var ai = 0; ai < allImgs.length; ai++) {
            var asrc = getImgSrc(allImgs[ai]);
            asrc = asrc ? fixProxyUrl(asrc, src.domains[currentDomainIndex]) : '';
            if (asrc && asrc.indexOf('http') === 0 && !asrc.match(/\.(js|css|ico|svg)$/i) && asrc.indexOf('placeholder') === -1 && asrc.indexOf('avatar') === -1 && asrc.indexOf('logo') === -1 && asrc.indexOf('icon') === -1 && asrc.length > 30) {
              if (images.indexOf(asrc) === -1) images.push(asrc);
            }
          }
        }
      }

      for (var k = 0; k < images.length; k++) {
        images[k] = fixProxyUrl(images[k], src.domains[currentDomainIndex]);
        if (images[k].indexOf('//') === 0) images[k] = 'https:' + images[k];
      }
      return { images: images, fromScript: fromScript };
    }

    // ==================== 离线下载 ====================
    // 图片下载：代理竞速模式（同时发起多个请求，谁先成功用谁）
    var imageProxyCache = {};
    async function fetchImageAsBlob(url) {
      if (!url) return null;
      // blob: URL 直接读取
      if (url.indexOf('blob:') === 0) {
        try { return await (await fetch(url)).blob(); } catch(e) { return null; }
      }

      // 代理列表（wsrv.nl 专门做图片代理，最快，排第一）
      var proxies = [
        function(u) { return 'https://wsrv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//, '')); },
        function(u) { return 'https://images.weserv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//, '')); },
        function(u) { return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u); },
        function(u) { return 'https://corsproxy.io/?url=' + encodeURIComponent(u); }
      ];

      // 同时发起所有代理请求，取第一个成功的
      var controllers = [];
      var promises = proxies.map(function(proxyFn, i) {
        var controller = createTimeoutController(10000);
        controllers.push(controller);
        return fetch(proxyFn(url), { signal: controller.signal })
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.blob();
          })
          .then(function(blob) {
            if (blob.size < 1000) throw new Error('too small');
            return blob;
          });
      });

      try {
        // Promise.any: 取第一个成功，取消其余
        var blob = await Promise.any(promises);
        // 中断其他还在跑的请求
        for (var c = 0; c < controllers.length; c++) {
          try { controllers[c].abort(); } catch(e) {}
        }
        return blob;
      } catch(e) {
        // 全部失败
        return null;
      }
    }

    // 并行下载图片（batchSize 张一批）
    async function downloadImagesBatch(urls, onProgress, batchSize) {
      batchSize = batchSize || 6;
      var results = new Array(urls.length);
      var completed = 0;
      var queue = [];
      for (var i = 0; i < urls.length; i++) queue.push(i);

      async function worker() {
        while (queue.length > 0 && !downloadCancelled) {
          var idx = queue.shift();
          if (idx === undefined) break;
          try {
            var blob = await fetchImageAsBlob(urls[idx]);
            results[idx] = blob ? URL.createObjectURL(blob) : null;
          } catch(e) {
            results[idx] = null;
          }
          completed++;
          if (onProgress) onProgress(completed, urls.length);
        }
      }

      var workers = [];
      for (var w = 0; w < batchSize; w++) workers.push(worker());
      await Promise.all(workers);
      return results;
    }

      if (!selectedIndices || selectedIndices.length === 0) {
        selectedIndices = [];
        for (var i = 0; i < currentChapters.length; i++) selectedIndices.push(i);
      }

      downloadCancelled = false;
      var totalToDownload = selectedIndices.length;
      showDownloadProgress(totalToDownload, currentComicTitle);

      // 获取/创建 comicData（保留已下载的章节）
      var coverSrc = '';
      var coverImg = document.querySelector('.comic-detail-cover');
      if (coverImg && coverImg.src) coverSrc = coverImg.src;
      var authorText = '';
      var authorEl = document.querySelector('.comic-detail-author');
      if (authorEl) authorText = authorEl.textContent.trim();
      var descText = '';
      var descEl = document.querySelector('.comic-detail-desc');
      if (descEl) descText = descEl.textContent.trim();
      var tags = [];
      var tagEls = document.querySelectorAll('.comic-detail-tag');
      for (var t = 0; t < tagEls.length; t++) tags.push(tagEls[t].textContent.trim());

      var comicData = offlineLibrary[currentComicUrl];
      if (!comicData) {
        // 下载封面
        var coverBlobUrl = '';
        if (coverSrc && coverSrc.indexOf('http') === 0) {
          updateDownloadProgress(0, totalToDownload, '正在下载封面...');
          var coverBlob = await fetchImageAsBlob(coverSrc);
          if (coverBlob) coverBlobUrl = URL.createObjectURL(coverBlob);
        }
        comicData = {
          title: currentComicTitle,
          author: authorText,
          desc: descText,
          tags: tags,
          cover: coverBlobUrl || coverSrc,
          sourceName: currentSource ? currentSource.name : '',
          chapters: [],
          downloadedAt: Date.now(),
          totalImages: 0
        };
        for (var i = 0; i < currentChapters.length; i++) {
          comicData.chapters.push({ title: currentChapters[i].title, url: currentChapters[i].url, images: [] });
        }
        offlineLibrary[currentComicUrl] = comicData;
      }

      // 逐章下载选中的章节
      for (var si = 0; si < selectedIndices.length; si++) {
        if (downloadCancelled) { hideDownloadProgress(); log('下载已取消'); loadComicDetail(currentComicUrl, currentComicTitle); return; }

        var chapterIdx = selectedIndices[si];
        var chapterTitle = currentChapters[chapterIdx].title;

        // 阶段1：抓取章节图片列表
        updateDownloadProgress(si, totalToDownload, chapterTitle, 0, 0);
        document.getElementById('downloadChapterInfo').textContent = '正在解析: ' + chapterTitle;

        try {
          var result = await fetchChapterImages(chapterIdx);
          var imageUrls = result.images;

          if (imageUrls.length === 0) {
            log('"' + chapterTitle + '"未提取到图片');
            comicData.chapters[chapterIdx].images = [];
            continue;
          }

          // 阶段2：并行下载图片
          var blobUrls = await downloadImagesBatch(imageUrls, function(completed, total) {
            if (downloadCancelled) return;
            updateDownloadProgress(si, totalToDownload, chapterTitle, completed, total);
          }, 3);

          // 过滤掉 null
          var validUrls = [];
          for (var k = 0; k < blobUrls.length; k++) {
            if (blobUrls[k]) validUrls.push(blobUrls[k]);
          }

          // 如果已有旧图片，先释放
          var oldImages = comicData.chapters[chapterIdx].images || [];
          for (var oi = 0; oi < oldImages.length; oi++) {
            if (oldImages[oi].indexOf('blob:') === 0) URL.revokeObjectURL(oldImages[oi]);
          }

          comicData.chapters[chapterIdx].images = validUrls;
          comicData.totalImages = 0;
          for (var ci = 0; ci < comicData.chapters.length; ci++) {
            comicData.totalImages += comicData.chapters[ci].images.length;
          }
          log('下载"' + chapterTitle + '"完成: ' + validUrls.length + '/' + imageUrls.length + '张');
        } catch(e) {
          log('下载"' + chapterTitle + '"失败: ' + e.message);
          comicData.chapters[chapterIdx].images = [];
        }
      }

      hideDownloadProgress();
      log('下载完成: ' + comicData.title + ' · 共' + comicData.totalImages + '张图片');
      // 持久化到 IndexedDB
      saveComicToIDB(currentComicUrl);
      loadComicDetail(currentComicUrl, currentComicTitle);
    }

    function removeOfflineComic(comicUrl, skipRefresh) {
      var comic = offlineLibrary[comicUrl];
      if (!comic) return;
      for (var i = 0; i < comic.chapters.length; i++) {
        if (comic.chapters[i].images) {
          for (var j = 0; j < comic.chapters[i].images.length; j++) {
            URL.revokeObjectURL(comic.chapters[i].images[j]);
          }
        }
      }
      if (comic.cover && comic.cover.indexOf('blob:') === 0) URL.revokeObjectURL(comic.cover);
      delete offlineLibrary[comicUrl];
      // 同步删除 IndexedDB 记录
      idbDelete(comicUrl).catch(function(e) { log('IDB删除失败: ' + e.message); });
      log('已删除离线漫画: ' + comic.title);
      if (!skipRefresh) {
        if (currentView === 'detail' || currentComicUrl === comicUrl) loadComicDetail(currentComicUrl, currentComicTitle);
        else showOfflineLibrary();
      }
    }

    function isComicDownloaded(comicUrl) {
      var comic = offlineLibrary[comicUrl];
      if (!comic || !comic.chapters || comic.chapters.length === 0) return false;
      for (var i = 0; i < comic.chapters.length; i++) {
        if (comic.chapters[i].images && comic.chapters[i].images.length > 0) return true;
      }
      return false;
    }

    // ==================== 加载漫画列表 ====================
    async function loadComicList(type) {
      type = type || 'recommend';
      currentView = 'list';
      if (!currentSource) currentSource = getFastestSource();
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画列表...</p>' +
          '<p class="comic-loading-tips">来源: ' + src.name + '，请稍候</p>' +
        '</div>';

      var path = src.listPaths[type] || src.listPaths.recommend;
      var targetUrl = src.domains[currentDomainIndex] + path;

      try {
        var html = await fetchWithProxies(targetUrl, src.domains[0]);
        var doc = parseHTML(html);

        var cards = findElements(doc, src.selectors.card, 3);

        if (cards.length === 0) {
          var allLinks = doc.querySelectorAll('a[href*="' + src.comicUrlPattern.source.replace(/[\/\\\[\]\(\)]/g, function(c) { return c; }) + '"]');
          if (allLinks.length === 0) {
            allLinks = doc.querySelectorAll('a[href*="/comic"], a[href*="/manga"]');
          }
          log('备用方案: 找到' + allLinks.length + '个链接');
          var seenUrls = {};
          var tempCards = [];
          for (var al = 0; al < allLinks.length; al++) {
            var alHref = fixProxyUrl(allLinks[al].getAttribute('href'), src.domains[currentDomainIndex]);
            if (alHref && !seenUrls[alHref] && alHref.length > 10) {
              seenUrls[alHref] = true;
              var parent = allLinks[al].closest('div, li, article') || allLinks[al].parentElement;
              if (parent) tempCards.push(parent);
            }
          }
          if (tempCards.length >= 3) cards = tempCards;
        }

        if (cards.length === 0) {
          showErrorWithActions('未找到漫画数据', '请尝试切换其他漫画源', true);
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        var seenHrefs = {};
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a[href]');
          if (!link) continue;
          var href = fixProxyUrl(link.getAttribute('href'), src.domains[currentDomainIndex]);
          if (!href || href === '#' || seenHrefs[href]) continue;
          seenHrefs[href] = true;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4, [class*="name"]');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) {
              titleText = txt;
              break;
            }
          }
          if (!titleText && link) titleText = link.textContent.trim().substring(0, 30);

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);
          if (imgSrc) imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);

          var chapterEls = card.querySelectorAll('[class*="chapter"], em, [class*="subtitle"], [class*="info"]');
          var chapterText = '';
          for (var ch = 0; ch < chapterEls.length; ch++) {
            var chtxt = chapterEls[ch].textContent.trim();
            if (chtxt && chtxt.length > 1 && chtxt.length < 40) {
              chapterText = chtxt;
              break;
            }
          }

          if (href && titleText) {
            var safeHref = href.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            var safeTitle = titleText.replace(/"/g, '&quot;');
            htmlStr +=
              '<div class="comic-card" data-action="comic-detail" data-url="' + safeHref + '" data-title="' + safeTitle + '">' +
                (imgSrc ? '<img class="comic-card-img" src="' + imgSrc + '" alt="' + safeTitle + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' :
                 '<div class="comic-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">📖</div>') +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + safeTitle + '</div>' +
                  (chapterText ? '<div class="comic-card-chapter">' + chapterText + '</div>' : '') +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        if (count === 0) {
          showErrorWithActions('未能解析漫画列表', '请尝试切换其他漫画源', true);
          return;
        }

        content.innerHTML = htmlStr;
        showSourceInfo('来源: ' + src.name + ' · 共 ' + count + ' 部', 'ok');
        log('加载 ' + count + ' 部漫画 (' + src.name + ')');
      } catch (e) {
        log('加载列表失败: ' + e.message);
        showErrorWithActions('加载失败', e.message, true, [
          { text: '重试', action: 'loadComicList(\'' + type + '\')' },
          { text: '切换源', action: 'tryNextSource(\'list\',\'' + type + '\')' }
        ]);
      }
    }

    function tryNextSource(viewType, param) {
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var idx = -1;
      for (var i = 0; i < COMIC_SOURCES.length; i++) {
        if (COMIC_SOURCES[i].id === currentSource.id) {
          idx = i;
          break;
        }
      }
      var nextIdx = (idx + 1) % COMIC_SOURCES.length;
      currentSource = COMIC_SOURCES[nextIdx];
      currentDomainIndex = 0;

      var tabs = document.querySelectorAll('.source-tab');
      for (var t = 0; t < tabs.length; t++) {
        tabs[t].classList.remove('active');
        if (tabs[t].getAttribute('data-id') === currentSource.id) {
          tabs[t].classList.add('active');
        }
      }

      log('自动切换到: ' + currentSource.name);
      if (viewType === 'list') loadComicList(param || 'recommend');
      else if (viewType === 'search') searchComic(param);
      else if (viewType === 'detail') loadComicDetail(currentComicUrl, currentComicTitle);
    }

      currentView = 'detail';
      currentComicUrl = comicUrl;
      currentComicTitle = fallbackTitle || '';
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画详情...</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchWithProxies(comicUrl, src.domains[0]);
        var doc = parseHTML(html);

        var titleText = findFirstText(doc, src.selectors.title) || fallbackTitle || '未知漫画';
        var authorText = findFirstText(doc, src.selectors.author);
        var descText = findFirstText(doc, src.selectors.desc);

        var coverSrc = '';
        for (var ci = 0; ci < src.selectors.cover.length; ci++) {
          var cel = doc.querySelector(src.selectors.cover[ci]);
          if (cel) {
            coverSrc = getImgSrc(cel);
            if (coverSrc) {
              coverSrc = fixProxyUrl(coverSrc, src.domains[currentDomainIndex]);
              break;
            }
          }
        }

        var tagsHtml = '';
        var tagContainer = doc.querySelector('[class*="tag"]:not([class*="nav"]):not(nav), .tags, .tag-list');
        if (tagContainer) {
          var tags = tagContainer.querySelectorAll('span, a');
          for (var ti = 0; ti < tags.length; ti++) {
            var ttxt = tags[ti].textContent.trim();
            if (ttxt && ttxt.length >= 2 && ttxt.length < 15) {
              tagsHtml += '<span class="comic-detail-tag">' + ttxt + '</span>';
            }
          }
        }

        var chapterLinks = findElements(doc, src.selectors.chapters, 3);

        if (chapterLinks.length < 3) {
          var allLinks = doc.querySelectorAll('a[href]');
          var seenCh = {};
          for (var al2 = 0; al2 < allLinks.length; al2++) {
            var hr = fixProxyUrl(allLinks[al2].getAttribute('href'), src.domains[currentDomainIndex]);
            var txt = allLinks[al2].textContent.trim();
            if (hr && txt && (hr.indexOf('chapter') !== -1 || hr.indexOf('read') !== -1 || hr.match(/\d+\.html/)) && txt.length < 30) {
              if (!seenCh[hr]) {
                seenCh[hr] = true;
              }
            }
          }
        }

        currentChapters = [];
        var seenChapterUrls = {};
        for (var cl = 0; cl < chapterLinks.length; cl++) {
          var chLink = chapterLinks[cl];
          var chref = fixProxyUrl(chLink.getAttribute('href'), src.domains[currentDomainIndex]);
          var chtext = chLink.textContent.trim();
          if (chref && chtext && !seenChapterUrls[chref] && chtext.length < 50) {
            seenChapterUrls[chref] = true;
            currentChapters.push({ url: chref, title: chtext });
          }
        }

        if (currentChapters.length > 1) {
          sortChapters(currentChapters);
        }

        var chapterHtml = '';
        for (var ch = 0; ch < currentChapters.length; ch++) {
          chapterHtml += '<div class="chapter-item" data-action="load-chapter" data-index="' + ch + '">' + currentChapters[ch].title + '</div>';
        }

        var safeTitle = titleText.replace(/"/g, '&quot;');
        var chapterSearchHtml =
          '<div class="chapter-toolbar">' +
            '<div class="chapter-search-wrap">' +
              '<i data-lucide="search" style="width:14px;height:14px;"></i>' +
              '<input type="text" class="chapter-search-input" placeholder="搜索章节..." data-action="chapter-search">' +
            '</div>' +
            '<div class="chapter-quick-actions">' +
              '<button data-action="chapter-first" title="第一话"><i data-lucide="chevrons-left" style="width:14px;height:14px;"></i></button>' +
              '<button data-action="chapter-current" title="当前话"><i data-lucide="circle-dot" style="width:14px;height:14px;"></i></button>' +
              '<button data-action="chapter-last" title="最后一话"><i data-lucide="chevrons-right" style="width:14px;height:14px;"></i></button>' +
            '</div>' +
          '</div>';

        var chapterHtml = generateChapterList(currentChapters);

        var downloadSectionHtml = '';
        if (isComicDownloaded(comicUrl)) {
          downloadSectionHtml =
            '<div class="comic-download-section">' +
              '<div class="comic-downloaded-badge" style="margin-bottom:10px;">' +
                '<i data-lucide="check-circle" style="width:18px;height:18px;color:#22c55e;"></i>' +
                '<span>已下载到内存 · 可离线观看</span>' +
                '<button class="remove-download-btn" data-action="remove-download">删除下载</button>' +
              '</div>' +
              '<button class="download-comic-btn" data-action="download-comic">' +
                '<i data-lucide="download" style="width:16px;height:16px;"></i>' +
                '<span>继续下载其他章节</span>' +
              '</button>' +
            '</div>';
        } else {
          downloadSectionHtml =
            '<div class="comic-download-section">' +
              '<button class="download-comic-btn" data-action="download-comic">' +
                '<i data-lucide="download-cloud" style="width:18px;height:18px;"></i>' +
                '<span>选择章节下载到内存 (离线观看)</span>' +
              '</button>' +
            '</div>';
        }

        content.innerHTML =
          '<div class="comic-detail">' +
            '<button class="comic-back-btn" data-action="back-list">' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回列表' +
            '</button>' +
            '<div class="comic-detail-header">' +
              (coverSrc ? '<img class="comic-detail-cover" src="' + coverSrc + '" alt="' + safeTitle + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' : '') +
              '<div class="comic-detail-meta">' +
                '<div class="comic-detail-title">' + safeTitle + '</div>' +
                (authorText ? '<div class="comic-detail-author">' + authorText + '</div>' : '') +
                '<div class="comic-detail-tags">' + tagsHtml + '</div>' +
                (descText ? '<div class="comic-detail-desc">' + descText.substring(0, 200) + '</div>' : '') +
              '</div>' +
            '</div>' +
            downloadSectionHtml +
            '<h3 style="font-size:1.05rem;margin-bottom:12px;color:var(--text-primary);">章节列表 (' + currentChapters.length + '话)</h3>' +
            chapterSearchHtml +
            '<div class="chapter-list" id="chapterList">' + chapterHtml + '</div>' +
          '</div>';
        safeLucide();
      } catch (e) {
        showErrorWithActions('加载详情失败', e.message, true, [
          { text: '重试', action: 'loadComicDetail("' + comicUrl.replace(/'/g, "\\'") + '", "' + (fallbackTitle || '').replace(/'/g, "\\'") + '")' },
          { text: '换源', action: 'tryNextSourceChapter()' },
          { text: '返回列表', action: 'goBackToList()' }
        ]);
      }
    }

    // ==================== 阅读器 ====================
    function goBackToDetail() {
      if (offlineLibrary[currentComicUrl]) {
        openOfflineComic(currentComicUrl);
      } else {
        loadComicDetail(currentComicUrl, currentComicTitle);
      }
    }

    async function loadChapter(index) {
      currentView = 'reader';
      currentChapterIndex = index;
      var chapter = currentChapters[index];
      if (!currentSource) currentSource = COMIC_SOURCES[0];
      var src = currentSource;

      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载章节...</p>' +
          '<p class="comic-loading-tips">' + chapter.title + '</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var images = [];
        var hasWatermark = true;
        var isOffline = false;

        // 优先检查离线缓存
        var offlineComic = offlineLibrary[currentComicUrl];
        if (offlineComic && offlineComic.chapters[index] && offlineComic.chapters[index].images.length > 0) {
          images = offlineComic.chapters[index].images;
          hasWatermark = false;
          isOffline = true;
          log('使用离线缓存: ' + chapter.title);
        } else {
          var result = await fetchChapterImages(index);
          images = result.images;
          hasWatermark = !result.fromScript;
        }

        var prevBtn = index > 0
          ? '<button data-action="chapter-prev" data-index="' + (index - 1) + '"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>'
          : '<button disabled><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>';
        var nextBtn = index < currentChapters.length - 1
          ? '<button data-action="chapter-next" data-index="' + (index + 1) + '">下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>'
          : '<button disabled>下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>';

        var watermarkBadge = hasWatermark
          ? '<span class="watermark-badge watermarked"><i data-lucide="droplet" style="width:10px;height:10px;"></i>可能有水印</span>'
          : '<span class="watermark-badge clean"><i data-lucide="check" style="width:10px;height:10px;"></i>纯净无水印</span>';

        var sourceBadge = isOffline
          ? '<span class="watermark-badge" style="background:rgba(34,197,94,0.15);color:#22c55e;"><i data-lucide="wifi-off" style="width:10px;height:10px;"></i>离线模式</span>'
          : '<span class="watermark-badge" style="background:rgba(99,102,241,0.15);color:var(--accent-primary);">来源: ' + src.name + '</span>';

        var imagesHtml = '';
        for (var img = 0; img < images.length; img++) {
          var imgSrc = images[img];
          // blob: URL 直接使用，普通 URL 需要修正
          if (imgSrc.indexOf('blob:') !== 0) {
            imgSrc = fixProxyUrl(imgSrc, src.domains[currentDomainIndex]);
            if (imgSrc.indexOf('//') === 0) imgSrc = 'https:' + imgSrc;
          }
          imagesHtml +=
            '<div class="comic-image-wrap" data-src="' + imgSrc + '" data-backup-src="" data-index="' + img + '" style="min-height:200px;">' +
              '<img src="' + imgSrc + '" alt="第' + (img + 1) + '页" referrerpolicy="no-referrer" ' +
                   'onerror="retryComicImage(this)" ' +
                   'onload="this.parentElement.style.minHeight=\'\'" ' +
                   'style="width:100%;display:block;">' +
              '<div class="comic-image-placeholder">' +
                '<span class="mini-spinner"></span>加载中...' +
              '</div>' +
            '</div>';
        }

        var safeUrl = currentComicUrl.replace(/'/g, "\\'");
        var safeTitle = (currentComicTitle || '').replace(/"/g, '&quot;');
        content.innerHTML =
          '<div class="comic-reader">' +
            '<button class="comic-back-btn" data-action="back-detail">' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回详情' +
            '</button>' +
            '<div class="comic-reader-title">' +
              chapter.title +
              '<div style="margin-top:8px;display:flex;justify-content:center;gap:8px;">' + watermarkBadge + sourceBadge +
              '</div>' +
            '</div>' +
            '<div class="comic-reader-nav">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
            '<div class="comic-reader-images">' +
              (imagesHtml || '<p style="text-align:center;color:var(--text-muted);padding:40px;">本章节暂无图片数据</p>') +
            '</div>' +
            '<div class="comic-reader-nav" style="margin-top:24px;">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
          '</div>';
        safeLucide();

        // 图片加载后隐藏占位符
        var placeholders = content.querySelectorAll('.comic-image-placeholder');
        var loadedImgs = content.querySelectorAll('.comic-reader-images img');
        for (var li = 0; li < loadedImgs.length; li++) {
          (function(imgEl, phEl) {
            if (imgEl.complete && imgEl.naturalWidth > 0) {
              if (phEl) phEl.style.display = 'none';
              imgEl.parentElement.style.minHeight = '';
            } else {
              imgEl.addEventListener('load', function() {
                if (phEl) phEl.style.display = 'none';
                imgEl.parentElement.style.minHeight = '';
              });
              imgEl.addEventListener('error', function() {
                if (phEl) phEl.style.display = 'none';
              });
            }
          })(loadedImgs[li], placeholders[li]);
        }

        // 预加载下一章和上一章的图片（离线模式跳过）
        if (!isOffline) {
          preloadAdjacentChapters(index);
        }
      } catch (e) {
        showErrorWithActions('加载章节失败', e.message, true, [
          { text: '重试', action: 'loadChapter(' + index + ')' },
          { text: '返回详情', action: 'goBackToDetail()' }
        ]);
      }
    }

    // ==================== 章节列表管理 ====================
    function generateChapterList(chapters) {
      if (!chapters || chapters.length === 0) return '';

      var grouped = {};
      for (var i = 0; i < chapters.length; i++) {
        var title = chapters[i].title;
        var groupKey = '其他';
        if (title.match(/第[\d一二三四五六七八九十百]+话/)) groupKey = '正篇';
        else if (title.match(/番外|特别篇|SP/)) groupKey = '番外';
        else if (title.match(/序章|序幕|引子/)) groupKey = '序章';
        else if (title.match(/外传/)) groupKey = '外传';
        else if (title.match(/第[\d一二三四五六七八九十百]+卷/)) groupKey = '单行本';
        else if (title.match(/第[\d一二三四五六七八九十百]+季/)) groupKey = '分季';
        else if (title.match(/OVA|OAD/)) groupKey = 'OVA';

        if (!grouped[groupKey]) grouped[groupKey] = [];
        grouped[groupKey].push({ index: i, title: title });
      }

      var html = '';
      var groupOrder = ['序章', '正篇', '番外', '外传', '单行本', '分季', 'OVA', '其他'];

      for (var g = 0; g < groupOrder.length; g++) {
        var groupName = groupOrder[g];
        if (!grouped[groupName]) continue;

        var items = grouped[groupName];
        html += '<div class="chapter-group">' +
                  '<div class="chapter-group-header" data-action="toggle-group">' +
                    '<i data-lucide="chevron-right" class="group-toggle-icon" style="width:14px;height:14px;"></i>' +
                    '<span>' + groupName + '</span>' +
                    '<span class="group-count">(' + items.length + ')</span>' +
                  '</div>' +
                  '<div class="chapter-group-content">';

        for (var j = 0; j < items.length; j++) {
          var isCurrent = items[j].index === currentChapterIndex;
          html += '<div class="chapter-item' + (isCurrent ? ' current' : '') + '" data-action="load-chapter" data-index="' + items[j].index + '">' + items[j].title + '</div>';
        }

        html += '</div></div>';
      }

      return html;
    }

    function toggleChapterGroup(header) {
      var content = header.nextElementSibling;
      var icon = header.querySelector('.group-toggle-icon');
      if (content.style.display === 'none') {
        content.style.display = 'block';
        icon.style.transform = 'rotate(90deg)';
      } else {
        content.style.display = 'none';
        icon.style.transform = 'rotate(0deg)';
      }
    }

    function filterChapters(keyword) {
      var chapterList = document.getElementById('chapterList');
      if (!chapterList) return;

      var groups = chapterList.querySelectorAll('.chapter-group');
      var keywordLower = keyword.toLowerCase().trim();

      for (var g = 0; g < groups.length; g++) {
        var group = groups[g];
        var items = group.querySelectorAll('.chapter-item');
        var hasMatch = false;

        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var title = item.textContent.toLowerCase();
          if (title.indexOf(keywordLower) !== -1) {
            item.style.display = 'block';
            hasMatch = true;
          } else {
            item.style.display = 'none';
          }
        }

        var header = group.querySelector('.chapter-group-header');
        var content = group.querySelector('.chapter-group-content');
        if (hasMatch) {
          group.style.display = 'block';
          content.style.display = 'block';
          header.querySelector('.group-toggle-icon').style.transform = 'rotate(90deg)';
        } else {
          group.style.display = 'none';
        }
      }
    }

    function scrollToCurrentChapter() {
      var currentItem = document.querySelector('.chapter-item.current');
      if (currentItem) {
        currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        currentItem.style.backgroundColor = 'var(--accent-primary)';
        currentItem.style.color = '#fff';
        setTimeout(function() {
          currentItem.style.backgroundColor = '';
          currentItem.style.color = '';
        }, 2000);
      }
    }
    var CORS_IMAGE_PROXIES = [
      'https://images.weserv.nl/?url=',
      'https://api.allorigins.win/raw?url=',
      'https://corsproxy.io/?url=',
      'https://cors-anywhere.herokuapp.com/'
    ];

    function retryComicImage(img) {
      var wrap = img.parentElement;
      if (!wrap) return;

      var originalSrc = wrap.getAttribute('data-src');
      var backupSrc = wrap.getAttribute('data-backup-src');
      var retryCount = parseInt(wrap.getAttribute('data-retry-count') || '0');

      if (retryCount >= 3) {
        img.style.display = 'none';
        var placeholder = wrap.querySelector('.comic-image-placeholder');
        if (placeholder) {
          placeholder.textContent = '加载失败，点击重试';
          placeholder.style.display = 'flex';
          placeholder.onclick = function() {
            wrap.setAttribute('data-retry-count', '0');
            img.style.display = 'block';
            img.src = originalSrc;
            placeholder.style.display = 'none';
          };
        }
        return;
      }

      retryCount++;
      wrap.setAttribute('data-retry-count', retryCount.toString());

      var proxyUrl = CORS_IMAGE_PROXIES[(retryCount - 1) % CORS_IMAGE_PROXIES.length];
      var newSrc = proxyUrl + encodeURIComponent(originalSrc);

      log('图片重试 (' + retryCount + ') 使用代理: ' + newSrc.substring(0, 60));
      img.src = newSrc;
    }
    function showErrorWithActions(title, detail, showDetail, actions) {
      var content = document.getElementById('comicContent');
      showSourceInfo('加载失败', 'error');

      var actionsHtml = '';
      if (actions && actions.length > 0) {
        actionsHtml = '<div class="comic-error-actions">';
        for (var i = 0; i < actions.length; i++) {
          var btnClass = i === 0 ? 'comic-error-btn primary' : 'comic-error-btn';
          actionsHtml += '<button class="' + btnClass + '" onclick="' + actions[i].action + '">' + actions[i].text + '</button>';
        }
        actionsHtml += '</div>';
      } else {
        actionsHtml =
          '<div class="comic-error-actions">' +
            '<button class="comic-error-btn primary" onclick="loadComicList(\'recommend\')">' +
              '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>重新加载' +
            '</button>' +
          '</div>';
      }

      var detailHtml = '';
      if (showDetail && detail) {
        detailHtml = '<div class="comic-error-detail">' + (detail.substring(0, 500)) + '</div>';
      }

      content.innerHTML =
        '<div class="comic-error">' +
          '<i data-lucide="wifi-off"></i>' +
          '<p>' + title + '</p>' +
          '<p style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;">建议切换其他漫画源试试</p>' +
          actionsHtml +
          detailHtml +
        '</div>';
      safeLucide();
    }

      currentView = 'list';
      var activeTag = document.querySelector('.comic-tag.active');
      loadComicList(activeTag ? activeTag.dataset.type : 'recommend');
    }

    var tagElements = document.querySelectorAll('.comic-tag');
    for (var ti = 0; ti < tagElements.length; ti++) {
      tagElements[ti].addEventListener('click', function() {
        var allTags = document.querySelectorAll('.comic-tag');
        for (var at = 0; at < allTags.length; at++) {
          allTags[at].classList.remove('active');

    // 章节搜索防抖处理
    var debouncedFilter = debounce(filterChapters, 200);
    document.addEventListener('input', function(e) {
      var target = e.target;
      while (target) {
        if (target.matches && target.matches('[data-action="chapter-search"]')) {
          debouncedFilter(target.value);
          return;
        }
        target = target.parentElement;
      }
    });

    // ==================== 章节预加载 ====================
    var preloadedChapters = {};

    function preloadAdjacentChapters(currentIndex) {
      // 预加载下一章
      if (currentIndex < currentChapters.length - 1) {
        preloadChapterImages(currentIndex + 1);
      }
      // 预加载上一章
      if (currentIndex > 0) {
        preloadChapterImages(currentIndex - 1);
      }
    }

    async function preloadChapterImages(index) {
      var key = 'ch_' + index;
      if (preloadedChapters[key]) return;
      preloadedChapters[key] = [];

      var chapter = currentChapters[index];
      if (!chapter) return;

      try {
        var src = currentSource || COMIC_SOURCES[0];
        var html = await fetchWithProxies(chapter.url, src.domains[0]);
        var doc = parseHTML(html);
        var images = [];

        var scriptImages = extractImagesFromScript(html);
        if (scriptImages.length >= 5) {
          images = scriptImages;
        } else {
          var containerSelectors = src.selectors.images || ['.comic-content', 'article'];
          for (var cs = 0; cs < containerSelectors.length; cs++) {
            var container = doc.querySelector(containerSelectors[cs]);
            if (container) {
              var imgs = container.querySelectorAll('amp-img, img');
              for (var i = 0; i < imgs.length; i++) {
                var imgsrc = getImgSrc(imgs[i]);
                imgsrc = imgsrc ? fixProxyUrl(imgsrc, src.domains[currentDomainIndex]) : '';
                if (imgsrc && imgsrc.indexOf('http') === 0 && imgsrc.length > 30) {
                  images.push(imgsrc);
                }
              }
              if (images.length >= 3) break;
            }
          }
        }

        // 用 Image 对象预加载图片到浏览器缓存
        for (var p = 0; p < images.length; p++) {
          var fixedUrl = fixProxyUrl(images[p], src.domains[currentDomainIndex]);
          if (fixedUrl.indexOf('//') === 0) fixedUrl = 'https:' + fixedUrl;
          var preloadImg = new Image();
          preloadImg.src = fixedUrl;
          preloadedChapters[key].push(fixedUrl);
        }
        log('预加载第' + (index + 1) + '话: ' + images.length + '张图片');
      } catch (e) {
        log('预加载第' + (index + 1) + '话失败: ' + e.message);
      }
    }

    // ==================== 阅读器触摸手势 ====================
    var touchStartX = 0;
    var touchStartY = 0;
    var lastTapTime = 0;

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;

      var now = Date.now();
      if (now - lastTapTime < 300) {
        e.preventDefault();
        var target = e.target;
        while (target) {
          if (target.tagName === 'IMG' && target.closest('.comic-reader-images')) {
            toggleImageZoom(target);
            break;
          }
          target = target.parentElement;
        }
      }
      lastTapTime = now;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (currentView !== 'reader') return;

      var touchEndX = e.changedTouches[0].clientX;
      var touchEndY = e.changedTouches[0].clientY;
      var diffX = touchEndX - touchStartX;
      var diffY = touchEndY - touchStartY;

      if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 0 && currentChapterIndex > 0) {
          loadChapter(currentChapterIndex - 1);
        } else if (diffX < 0 && currentChapterIndex < currentChapters.length - 1) {
          loadChapter(currentChapterIndex + 1);
        }
      }
    });

    function toggleImageZoom(img) {
      if (!img) return;
      if (img.style.transform && img.style.transform.indexOf('scale') !== -1) {
        img.style.transform = '';
        img.style.transition = 'transform 0.3s ease';
      } else {
        img.style.transform = 'scale(2)';
        img.style.transition = 'transform 0.3s ease';
        img.style.cursor = 'zoom-out';
      }
    }

    // ==================== 初始化 ====================
    initSourceTabs();
    currentSource = COMIC_SOURCES[0];
    safeLucide();
    log('漫画模块初始化完成');

    // 注册 Service Worker（离线缓存页面）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        log('Service Worker 注册成功');
      }).catch(function(err) {
        log('Service Worker 注册失败: ' + err.message);
      });
    }

    // 从 IndexedDB 恢复离线漫画
    restoreOfflineLibrary();

    // 等待 Lucide 加载完成后重新初始化图标
    var lucideRetryCount = 0;
    function waitForLucide() {
      if (typeof lucide !== 'undefined' && lucide.createIcons) {
        safeLucide();
        log('Lucide 加载完成，图标已初始化');
      } else if (lucideRetryCount < 20) {
        lucideRetryCount++;
        setTimeout(waitForLucide, 500);
      }
    }
    if (typeof lucide === 'undefined') {
      setTimeout(waitForLucide, 500);
    }

    // 离线检测：无网时直接显示离线书架
    function showOfflineNotice() {
      var content = document.getElementById('comicContent');
      var hasOffline = Object.keys(offlineLibrary).length > 0;
      if (hasOffline) {
        content.innerHTML =
          '<div class="offline-empty">' +
            '<i data-lucide="wifi-off"></i>' +
            '<p>当前处于离线状态</p>' +
            '<p style="font-size:0.82rem;margin-top:8px;">已加载 ' + Object.keys(offlineLibrary).length + ' 部离线漫画，可离线观看</p>' +
            '<div class="comic-error-actions" style="margin-top:20px;">' +
              '<button class="comic-error-btn primary" onclick="showOfflineLibrary()">打开离线书架</button>' +
            '</div>' +
          '</div>';
      } else {
        content.innerHTML =
          '<div class="offline-empty">' +
            '<i data-lucide="wifi-off"></i>' +
            '<p>当前处于离线状态</p>' +
            '<p style="font-size:0.82rem;margin-top:8px;">离线书架为空，请联网后下载漫画</p>' +
          '</div>';
      }
      hideSourceInfo();
      safeLucide();
    }

    // 加载漫画列表（联网时）或显示离线提示
    setTimeout(function() {
      if (!navigator.onLine) {
        log('检测到离线状态，显示离线提示');
        showOfflineNotice();
      } else if (currentSource) {
        loadComicList('recommend');
      }
    }, 200);

    // 监听网络状态变化
    window.addEventListener('offline', function() {
      log('网络已断开');
      showOfflineNotice();
    });
    window.addEventListener('online', function() {
      log('网络已恢复');
      if (currentView === 'list' || currentView === 'offline') {
        loadComicList('recommend');
      }
    });

    // 离线书架按钮
    document.getElementById('offlineLibraryBtn').addEventListener('click', function() {
      showOfflineLibrary();
    });
    // 取消下载按钮
    document.getElementById('downloadCancelBtn').addEventListener('click', function() {
      downloadCancelled = true;
    });
  </script>
</body>
</html>
