<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫画 | 蘇魚</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 漫画页面专用样式 */
    .comic-page {
      min-height: 100vh;
      padding-top: 80px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .comic-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .comic-header h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comic-header h1 .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gradient-short);
      color: #fff;
      font-weight: 500;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-home:hover {
      border-color: var(--accent-primary);
      transform: translateX(-2px);
    }

    /* 搜索栏 */
    .comic-search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .comic-search-wrap {
      display: flex;
      gap: 10px;
      max-width: 500px;
    }

    .comic-search-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .comic-search-input:focus {
      border-color: var(--accent-primary);
    }

    .comic-search-input::placeholder {
      color: var(--text-muted);
    }

    .comic-search-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .comic-search-btn:hover {
      transform: scale(1.03);
    }

    .comic-search-btn:active {
      transform: scale(0.98);
    }

    /* 分类标签 */
    .comic-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .comic-tag {
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .comic-tag:hover,
    .comic-tag.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    /* 漫画网格 */
    .comic-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .comic-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      transition: all 0.3s;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .comic-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: var(--bg-tertiary);
      display: block;
    }

    .comic-card-info {
      padding: 10px 12px;
    }

    .comic-card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-card-chapter {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 加载和提示 */
    .comic-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .comic-loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .comic-error {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .comic-error svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }

    /* 漫画详情 */
    .comic-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comic-detail-cover {
      width: 140px;
      height: 190px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .comic-detail-meta {
      flex: 1;
      min-width: 200px;
    }

    .comic-detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .comic-detail-author {
      font-size: 0.95rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .comic-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .comic-detail-tag {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .comic-detail-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .comic-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .comic-back-btn:hover {
      border-color: var(--accent-primary);
    }

    /* 章节列表 */
    .chapter-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .chapter-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      font-size: 0.88rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    /* 阅读器 */
    .comic-reader {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-reader-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .comic-reader-images {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
    }

    .comic-reader-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .comic-reader-nav button {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-reader-nav button:hover:not(:disabled) {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: #fff;
    }

    .comic-reader-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .comic-reader-nav .nav-center {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .comic-card-info {
        padding: 8px 10px;
      }

      .comic-card-title {
        font-size: 0.82rem;
      }

      .comic-card-chapter {
        font-size: 0.72rem;
      }

      .comic-header h1 {
        font-size: 1.3rem;
      }

      .comic-detail-cover {
        width: 100px;
        height: 135px;
      }

      .comic-detail-title {
        font-size: 1.15rem;
      }

      .chapter-list {
        grid-template-columns: 1fr;
      }

      .comic-search-wrap {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .comic-header {
        padding: 16px 14px 12px;
      }

      .comic-search-bar,
      .comic-tags,
      .comic-grid,
      .comic-detail,
      .comic-reader {
        padding-left: 14px;
        padding-right: 14px;
      }

      .comic-card-title {
        font-size: 0.76rem;
      }
    }
  </style>
</head>
<body>
  <!-- 进度条 -->
  <div class="progress-bar"><div class="progress-fill"></div></div>

  <!-- 导航 -->
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">蘇魚</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="novel.html">小说</a></li>
        <li><a href="tools.html">工具</a></li>
        <li><a href="index.html#sites">网站</a></li>
        <li><a href="comic.html" style="color:var(--accent-primary);">漫画</a></li>
        <li><a href="index.html#contact">联系</a></li>
      </ul>
    </div>
  </nav>

  <div class="comic-page">
    <div class="comic-header">
      <h1>
        <i data-lucide="book-open" style="width:28px;height:28px;color:var(--accent-primary);"></i>
        漫画阅读
        <span class="badge">纯净版</span>
      </h1>
      <a href="index.html" class="back-home">
        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
        返回主页
      </a>
    </div>

    <div class="comic-search-bar">
      <div class="comic-search-wrap">
        <input type="text" class="comic-search-input" id="searchInput" placeholder="搜索漫画..." onkeydown="if(event.key==='Enter') searchComic()">
        <button class="comic-search-btn" onclick="searchComic()">搜索</button>
      </div>
    </div>

    <div class="comic-tags" id="comicTags">
      <span class="comic-tag active" data-type="recommend">推荐</span>
      <span class="comic-tag" data-type="hot">热门</span>
      <span class="comic-tag" data-type="finish">完结</span>
      <span class="comic-tag" data-type="最新连载">连载中</span>
    </div>

    <div id="comicContent">
      <div class="comic-loading">
        <div class="spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    const BAOZI_BASE = 'https://cn.baozimh.com';
    // CORS 代理列表，按优先级尝试
    const CORS_PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,
    ];

    let currentProxyIndex = 0;
    let currentView = 'list'; // list | detail | reader
    let currentComicUrl = '';
    let currentChapters = [];
    let currentChapterIndex = 0;

    // ==================== 工具：创建超时 AbortController（兼容旧iOS） ====================
    function createTimeoutController(ms) {
      const controller = new AbortController();
      setTimeout(() => controller.abort(), ms);
      return controller;
    }

    // ==================== 代理请求 ====================
    async function proxyFetch(url) {
      for (let i = 0; i < CORS_PROXIES.length; i++) {
        const idx = (currentProxyIndex + i) % CORS_PROXIES.length;
        const proxyUrl = CORS_PROXIES[idx](url);
        try {
          const controller = createTimeoutController(15000);
          const resp = await fetch(proxyUrl, {
            signal: controller.signal
          });
          if (resp.ok) {
            const text = await resp.text();
            if (text && text.length > 100) {
              currentProxyIndex = idx;
              return text;
            }
          }
        } catch (e) {
          console.warn('代理 ' + idx + ' 失败:', e.message);
        }
      }
      throw new Error('所有代理均不可用');
    }

    // ==================== HTML 解析 ====================
    function parseHTML(htmlStr) {
      const parser = new DOMParser();
      return parser.parseFromString(htmlStr, 'text/html');
    }

    // 提取漫画封面图URL（处理amp-img）
    function getImgSrc(ampImg) {
      return ampImg.getAttribute('src') || ampImg.getAttribute('data-src') || '';
    }

    // ==================== 加载漫画列表 ====================
    async function loadComicList(type = 'recommend') {
      const content = document.getElementById('comicContent');
      content.innerHTML = '<div class="comic-loading"><div class="spinner"></div><p>加载中...</p></div>';

      let url;
      if (type === 'recommend') {
        url = BAOZI_BASE + '/';
      } else if (type === 'hot') {
        url = BAOZI_BASE + '/classify?type=hot';
      } else if (type === 'finish') {
        url = BAOZI_BASE + '/classify?type=finish';
      } else {
        url = BAOZI_BASE + '/classify?type=' + type;
      }

      try {
        const html = await proxyFetch(url);
        const doc = parseHTML(html);
        const cards = doc.querySelectorAll('.comics-card');

        if (cards.length === 0) {
          content.innerHTML = '<div class="comic-error"><i data-lucide="search-x"></i><p>暂无漫画数据</p></div>';
          lucide.createIcons();
          return;
        }

        let htmlStr = '<div class="comic-grid">';
        cards.forEach(card => {
          const link = card.querySelector('a');
          const href = link ? link.getAttribute('href') : '';
          const title = card.querySelector('.comics-card__title');
          const titleText = title ? title.textContent.trim() : '未知';
          const ampImg = card.querySelector('amp-img') || card.querySelector('img');
          const imgSrc = ampImg ? getImgSrc(ampImg) : '';
          const tag = card.querySelector('.tabs, .cls');
          const tagText = tag ? tag.textContent.trim() : '';

          // 提取最新章节信息
          const chapterInfo = card.querySelector('.supporting-text, em');
          const chapterText = chapterInfo ? chapterInfo.textContent.trim() : '';

          if (href && imgSrc) {
            const fullUrl = href.startsWith('http') ? href : BAOZI_BASE + href;
            htmlStr += `
              <div class="comic-card" onclick="loadComicDetail('${fullUrl}')">
                <img class="comic-card-img" src="${imgSrc}" alt="${titleText}" loading="lazy" referrerpolicy="no-referrer">
                <div class="comic-card-info">
                  <div class="comic-card-title">${titleText}</div>
                  <div class="comic-card-chapter">${chapterText || tagText}</div>
                </div>
              </div>
            `;
          }
        });
        htmlStr += '</div>';
        content.innerHTML = htmlStr;
      } catch (e) {
        content.innerHTML = `
          <div class="comic-error">
            <i data-lucide="wifi-off"></i>
            <p>加载失败，请稍后重试</p>
            <p style="font-size:0.8rem;margin-top:8px;color:var(--text-muted);">${e.message}</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // ==================== 搜索漫画 ====================
    async function searchComic() {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        loadComicList();
        return;
      }

      const content = document.getElementById('comicContent');
      content.innerHTML = '<div class="comic-loading"><div class="spinner"></div><p>搜索中...</p></div>';
      currentView = 'list';

      try {
        const url = BAOZI_BASE + '/search?q=' + encodeURIComponent(keyword);
        const html = await proxyFetch(url);
        const doc = parseHTML(html);
        const cards = doc.querySelectorAll('.comics-card');

        if (cards.length === 0) {
          content.innerHTML = `<div class="comic-error"><i data-lucide="search-x"></i><p>未找到"${keyword}"相关漫画</p></div>`;
          lucide.createIcons();
          return;
        }

        let htmlStr = `<div class="comic-grid">`;
        cards.forEach(card => {
          const link = card.querySelector('a');
          const href = link ? link.getAttribute('href') : '';
          const title = card.querySelector('.comics-card__title');
          const titleText = title ? title.textContent.trim() : '未知';
          const ampImg = card.querySelector('amp-img') || card.querySelector('img');
          const imgSrc = ampImg ? getImgSrc(ampImg) : '';

          if (href && imgSrc) {
            const fullUrl = href.startsWith('http') ? href : BAOZI_BASE + href;
            htmlStr += `
              <div class="comic-card" onclick="loadComicDetail('${fullUrl}')">
                <img class="comic-card-img" src="${imgSrc}" alt="${titleText}" loading="lazy" referrerpolicy="no-referrer">
                <div class="comic-card-info">
                  <div class="comic-card-title">${titleText}</div>
                </div>
              </div>
            `;
          }
        });
        htmlStr += '</div>';
        content.innerHTML = htmlStr;
      } catch (e) {
        content.innerHTML = `
          <div class="comic-error">
            <i data-lucide="wifi-off"></i>
            <p>搜索失败，请稍后重试</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // ==================== 漫画详情 ====================
    async function loadComicDetail(comicUrl) {
      currentView = 'detail';
      currentComicUrl = comicUrl;
      const content = document.getElementById('comicContent');
      content.innerHTML = '<div class="comic-loading"><div class="spinner"></div><p>加载详情...</p></div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        const html = await proxyFetch(comicUrl);
        const doc = parseHTML(html);

        const title = doc.querySelector('.comics-detail__title');
        const titleText = title ? title.textContent.trim() : '未知漫画';
        const author = doc.querySelector('.comics-detail__author');
        const authorText = author ? author.textContent.trim() : '';
        const desc = doc.querySelector('.comics-detail__desc');
        const descText = desc ? desc.textContent.trim() : '';
        const coverImg = doc.querySelector('.pure-u-1-1 amp-img, .pure-u-1-1 img');
        const coverSrc = coverImg ? getImgSrc(coverImg) : '';

        // 提取标签
        const tagList = doc.querySelectorAll('.tag-list .tag, .comics-detail__tag');
        let tagsHtml = '';
        tagList.forEach(t => {
          const tText = t.textContent.trim();
          if (tText) tagsHtml += `<span class="comic-detail-tag">${tText}</span>`;
        });

        // 提取章节列表
        const chapterLinks = doc.querySelectorAll('.comics-chapters a');
        currentChapters = [];
        chapterLinks.forEach(a => {
          const href = a.getAttribute('href');
          const text = a.textContent.trim();
          if (href && text) {
            const fullUrl = href.startsWith('http') ? href : BAOZI_BASE + href;
            currentChapters.push({ url: fullUrl, title: text });
          }
        });

        // 反转章节顺序（包子漫画默认倒序）
        currentChapters.reverse();

        let chapterHtml = '';
        currentChapters.forEach((ch, i) => {
          chapterHtml += `<div class="chapter-item" onclick="loadChapter(${i})">${ch.title}</div>`;
        });

        content.innerHTML = `
          <div class="comic-detail">
            <button class="comic-back-btn" onclick="goBackToList()">
              <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
              返回列表
            </button>
            <div class="comic-detail-header">
              ${coverSrc ? `<img class="comic-detail-cover" src="${coverSrc}" alt="${titleText}" referrerpolicy="no-referrer">` : ''}
              <div class="comic-detail-meta">
                <div class="comic-detail-title">${titleText}</div>
                ${authorText ? `<div class="comic-detail-author">${authorText}</div>` : ''}
                <div class="comic-detail-tags">${tagsHtml}</div>
                ${descText ? `<div class="comic-detail-desc">${descText}</div>` : ''}
              </div>
            </div>
            <h3 style="font-size:1.05rem;margin-bottom:12px;color:var(--text-primary);">章节列表 (${currentChapters.length}话)</h3>
            <div class="chapter-list">${chapterHtml}</div>
          </div>
        `;
        lucide.createIcons();
      } catch (e) {
        content.innerHTML = `
          <div class="comic-error">
            <i data-lucide="wifi-off"></i>
            <p>加载详情失败，请稍后重试</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // ==================== 阅读器 ====================
    async function loadChapter(index) {
      currentView = 'reader';
      currentChapterIndex = index;
      const content = document.getElementById('comicContent');
      const chapter = currentChapters[index];
      content.innerHTML = '<div class="comic-loading"><div class="spinner"></div><p>加载章节...</p></div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        const html = await proxyFetch(chapter.url);
        const doc = parseHTML(html);

        // 提取漫画图片
        const comicContain = doc.querySelector('.comic-contain');
        let images = [];
        if (comicContain) {
          const ampImgs = comicContain.querySelectorAll('amp-img, img');
          ampImgs.forEach(img => {
            const src = getImgSrc(img);
            if (src && !src.includes('placeholder')) {
              images.push(src);
            }
          });
        }

        if (images.length === 0) {
          // 备用：查找所有可能的漫画图片
          const allImgs = doc.querySelectorAll('amp-img[src*="baozimh"], amp-img[src*="hdslb"], img[src*="baozimh"], img[src*="hdslb"]');
          allImgs.forEach(img => {
            const src = getImgSrc(img);
            if (src) images.push(src);
          });
        }

        const prevBtn = index > 0
          ? `<button onclick="loadChapter(${index - 1})"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>`
          : `<button disabled><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>`;
        const nextBtn = index < currentChapters.length - 1
          ? `<button onclick="loadChapter(${index + 1})">下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>`
          : `<button disabled>下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>`;

        let imagesHtml = '';
        images.forEach(src => {
          imagesHtml += `<img src="${src}" alt="漫画页" referrerpolicy="no-referrer" loading="lazy">`;
        });

        content.innerHTML = `
          <div class="comic-reader">
            <button class="comic-back-btn" onclick="loadComicDetail('${currentComicUrl}')">
              <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
              返回详情
            </button>
            <div class="comic-reader-title">${chapter.title}</div>
            <div class="comic-reader-nav">
              ${prevBtn}
              <span class="nav-center">${index + 1} / ${currentChapters.length}</span>
              ${nextBtn}
            </div>
            <div class="comic-reader-images">
              ${imagesHtml || '<p style="text-align:center;color:var(--text-muted);padding:40px;">本章节无图片数据</p>'}
            </div>
            <div class="comic-reader-nav" style="margin-top:24px;">
              ${prevBtn}
              <span class="nav-center">${index + 1} / ${currentChapters.length}</span>
              ${nextBtn}
            </div>
          </div>
        `;
        lucide.createIcons();
      } catch (e) {
        content.innerHTML = `
          <div class="comic-error">
            <i data-lucide="wifi-off"></i>
            <p>加载章节失败，请稍后重试</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // ==================== 导航 ====================
    function goBackToList() {
      currentView = 'list';
      loadComicList(document.querySelector('.comic-tag.active')?.dataset.type || 'recommend');
    }

    // 分类标签点击
    document.querySelectorAll('.comic-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.comic-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        currentView = 'list';
        loadComicList(tag.dataset.type);
      });
    });

    // 浏览器后退
    window.addEventListener('popstate', (e) => {
      if (currentView === 'reader') {
        loadComicDetail(currentComicUrl);
      } else if (currentView === 'detail') {
        goBackToList();
      }
    });

    // 初始化
    lucide.createIcons();
    loadComicList();
  </script>
</body>
</html>
