<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫画 | 蘇魚</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <link rel="stylesheet" href="style.css">
  <meta name="referrer" content="no-referrer">
  <style>
    .comic-page {
      min-height: 100vh;
      padding-top: 80px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s, color 0.3s;
    }

    .comic-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .comic-header h1 {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comic-header h1 .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--gradient-short);
      color: #fff;
      font-weight: 500;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s;
    }

    .back-home:hover {
      border-color: var(--accent-primary);
      transform: translateX(-2px);
    }

    .comic-search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
    }

    .comic-search-wrap {
      display: flex;
      gap: 10px;
      max-width: 500px;
    }

    .comic-search-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .comic-search-input:focus {
      border-color: var(--accent-primary);
    }

    .comic-search-input::placeholder {
      color: var(--text-muted);
    }

    .comic-search-btn {
      padding: 12px 24px;
      border-radius: 100px;
      border: none;
      background: var(--gradient-short);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .comic-search-btn:hover {
      transform: scale(1.03);
    }

    .comic-search-btn:active {
      transform: scale(0.98);
    }

    .comic-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .comic-tag {
      padding: 6px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
    }

    .comic-tag:hover,
    .comic-tag.active {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .comic-card {
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      transition: all 0.3s;
    }

    .comic-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .comic-card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: var(--bg-tertiary);
      display: block;
    }

    .comic-card-info {
      padding: 10px 12px;
    }

    .comic-card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-card-chapter {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comic-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .comic-loading .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .comic-loading-tips {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .comic-error {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .comic-error svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }

    .comic-error-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .comic-error-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-error-btn:hover {
      border-color: var(--accent-primary);
    }

    .comic-error-btn.primary {
      background: var(--gradient-short);
      color: #fff;
      border-color: transparent;
    }

    .comic-error-detail {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      max-height: 150px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .comic-detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .comic-detail-cover {
      width: 140px;
      height: 190px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-tertiary);
    }

    .comic-detail-meta {
      flex: 1;
      min-width: 200px;
    }

    .comic-detail-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .comic-detail-author {
      font-size: 0.95rem;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }

    .comic-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .comic-detail-tag {
      font-size: 0.78rem;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .comic-detail-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .comic-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 100px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .comic-back-btn:hover {
      border-color: var(--accent-primary);
    }

    .chapter-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }

    .chapter-item {
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--bg-tertiary);
      font-size: 0.88rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-item:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    .comic-reader {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .comic-reader-title {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .comic-reader-images {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comic-reader-images img {
      width: 100%;
      display: block;
      background: var(--bg-tertiary);
    }

    .comic-reader-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .comic-reader-nav button {
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .comic-reader-nav button:hover:not(:disabled) {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
      color: #fff;
    }

    .comic-reader-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .comic-reader-nav .nav-center {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .source-info {
      max-width: 1200px;
      margin: 0 auto 12px;
      padding: 0 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-info .source-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    .source-info .source-dot.loading {
      background: #f59e0b;
    }

    .source-info .source-dot.error {
      background: #ef4444;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 768px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 12px;
      }

      .comic-card-info {
        padding: 8px 10px;
      }

      .comic-card-title {
        font-size: 0.82rem;
      }

      .comic-card-chapter {
        font-size: 0.72rem;
      }

      .comic-header h1 {
        font-size: 1.3rem;
      }

      .comic-detail-cover {
        width: 100px;
        height: 135px;
      }

      .comic-detail-title {
        font-size: 1.15rem;
      }

      .chapter-list {
        grid-template-columns: 1fr;
      }

      .comic-search-wrap {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .comic-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 10px;
      }

      .comic-header {
        padding: 16px 14px 12px;
      }

      .comic-search-bar,
      .comic-tags,
      .comic-grid,
      .comic-detail,
      .comic-reader,
      .source-info {
        padding-left: 14px;
        padding-right: 14px;
      }

      .comic-card-title {
        font-size: 0.76rem;
      }
    }
  </style>
</head>

  <div class="comic-page">

      <h1>
        <i data-lucide="book-open" style="width:28px;height:28px;color:var(--accent-primary);"></i>

      </h1>

        <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>

      </a>
    </div>

    <div class="comic-search-bar">
      <div class="comic-search-wrap">
        <input type="text" class="comic-search-input" id="searchInput" placeholder="搜索漫画名称..." onkeydown="if(event.key==='Enter') doSearch()">
        <button class="comic-search-btn" onclick="doSearch()">搜索</button>
      </div>
    </div>

    <div class="comic-tags" id="comicTags">
      <span class="comic-tag active" data-type="recommend">推荐</span>
      <span class="comic-tag" data-type="hot">热门</span>
      <span class="comic-tag" data-type="finish">完结</span>
      <span class="comic-tag" data-type="连载中">连载中</span>
    </div>

    <div class="source-info" id="sourceInfo" style="display:none;">
      <span class="source-dot" id="sourceDot"></span>
      <span id="sourceText">正在加载...</span>
    </div>

    <div id="comicContent">
      <div class="comic-loading">
        <div class="spinner"></div>
        <p>正在加载漫画...</p>
        <p class="comic-loading-tips">首次加载可能需要几秒钟，请耐心等待</p>
      </div>
    </div>
  </div>

  <script>
    // ==================== 数据源配置 ====================
    var BAOZI_DOMAINS = [
      'https://www.baozimh.com',
      'https://cn.baozimh.com',
      'https://www.baozimh.com',
      'http://www.baozimh.com'
    ];

    var CORS_PROXIES = [
      function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
      function(url) { return 'https://corsproxy.io/?url=' + encodeURIComponent(url); },
      function(url) { return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url); },
      function(url) { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(url); },
      function(url) { return 'https://gembed.com/' + url; }
    ];

    // ==================== 状态 ====================
    var currentDomainIndex = 0;
    var currentProxyIndex = 0;
    var currentView = 'list';
    var currentComicUrl = '';
    var currentComicTitle = '';
    var currentChapters = [];
    var currentChapterIndex = 0;
    var debugLogs = [];

    // ==================== 工具函数 ====================
    function log(msg) {
      debugLogs.push(msg);
      if (debugLogs.length > 50) debugLogs.shift();
      console.log('[漫画]', msg);
    }

    function createTimeoutController(ms) {
      var controller = new AbortController();
      setTimeout(function() { controller.abort(); }, ms);
      return controller;
    }

    function parseHTML(htmlStr) {
      var parser = new DOMParser();
      return parser.parseFromString(htmlStr, 'text/html');
    }

    function getImgSrc(el) {
      if (!el) return '';
      return el.getAttribute('src') || el.getAttribute('data-src') || el.getAttribute('data-original') || '';
    }

    function showSourceInfo(text, status) {
      var info = document.getElementById('sourceInfo');
      var dot = document.getElementById('sourceDot');
      var txt = document.getElementById('sourceText');
      info.style.display = 'flex';
      txt.textContent = text;
      dot.className = 'source-dot';
      if (status === 'loading') dot.classList.add('loading');
      if (status === 'error') dot.classList.add('error');
    }

    function hideSourceInfo() {
      document.getElementById('sourceInfo').style.display = 'none';
    }

    // ==================== 核心请求：多域名 + 多代理 ====================
    async function fetchComicHTML(pathOrUrl) {
      var url = pathOrUrl;
      var isFullUrl = pathOrUrl.indexOf('http') === 0;

      var attempts = [];
      for (var d = 0; d < BAOZI_DOMAINS.length; d++) {
        for (var p = 0; p < CORS_PROXIES.length; p++) {
          attempts.push({ domainIdx: d, proxyIdx: p });
        }
      }

      var errors = [];
      for (var i = 0; i < attempts.length; i++) {
        var attempt = attempts[i];
        var baseUrl = BAOZI_DOMAINS[attempt.domainIdx];
        var targetUrl = isFullUrl ? url : (baseUrl + pathOrUrl);
        var proxyUrl = CORS_PROXIES[attempt.proxyIdx](targetUrl);

        log('尝试: 域名' + attempt.domainIdx + ' + 代理' + attempt.proxyIdx + ' -> ' + targetUrl.substring(0, 60));
        showSourceInfo('正在尝试连接... (' + (i + 1) + '/' + attempts.length + ')', 'loading');

        try {
          var controller = createTimeoutController(12000);
          var resp = await fetch(proxyUrl, { signal: controller.signal });
          if (!resp.ok) {
            errors.push('代理' + attempt.proxyIdx + ': HTTP ' + resp.status);
            continue;
          }

          var text = await resp.text();

          var isJson = false;
          try {
            var json = JSON.parse(text);
            if (json && json.contents) {
              text = json.contents;
              isJson = true;
            } else if (json && json.data) {
              text = typeof json.data === 'string' ? json.data : '';
              isJson = true;
            }
          } catch (e) {}

          if (text && text.length > 200 && text.indexOf('<') !== -1) {
            log('成功! 域名' + attempt.domainIdx + ' 代理' + attempt.proxyIdx);
            currentDomainIndex = attempt.domainIdx;
            currentProxyIndex = attempt.proxyIdx;
            hideSourceInfo();
            return text;
          } else {
            errors.push('代理' + attempt.proxyIdx + ': 返回内容无效(' + (text ? text.length : 0) + '字节)');
          }
        } catch (e) {
          errors.push('代理' + attempt.proxyIdx + ': ' + e.message);
        }
      }

      throw new Error('所有数据源均不可用\n\n失败详情:\n' + errors.slice(0, 8).join('\n'));
    }

    // ==================== 加载漫画列表 ====================
    async function loadComicList(type) {
      type = type || 'recommend';
      currentView = 'list';
      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画列表...</p>' +
          '<p class="comic-loading-tips">正在尝试多线路连接，请稍候</p>' +
        '</div>';

      var path;
      if (type === 'recommend') {
        path = '/';
      } else if (type === 'hot') {
        path = '/classify?type=hot';
      } else if (type === 'finish') {
        path = '/classify?type=finish';
      } else if (type === '连载中') {
        path = '/classify?type=serial';
      } else {
        path = '/classify?type=' + type;
      }

      try {
        var html = await fetchComicHTML(path);
        var doc = parseHTML(html);

        var cards = [];
        var selectors = [
          '.comics-card',
          '.comic-card',
          '.card',
          '[class*="comic"][class*="card"]',
          '.pure-u-1-2'
        ];

        for (var s = 0; s < selectors.length; s++) {
          var found = doc.querySelectorAll(selectors[s]);
          if (found.length >= 6) {
            cards = found;
            log('使用选择器: ' + selectors[s] + ' (找到' + found.length + '个)');
            break;
          }
        }

        if (cards.length === 0) {
          showErrorWithActions('未找到漫画数据', html);
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a');
          var href = link ? link.getAttribute('href') : '';
          if (!href || href === '#') continue;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) {
              titleText = txt;
              break;
            }
          }

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);

          var chapterEls = card.querySelectorAll('[class*="chapter"], [class*="supporting"], em, [class*="subtitle"]');
          var chapterText = '';
          for (var ch = 0; ch < chapterEls.length; ch++) {
            var chtxt = chapterEls[ch].textContent.trim();
            if (chtxt && chtxt.length > 1 && chtxt.length < 40) {
              chapterText = chtxt;
              break;
            }
          }

          if (href && imgSrc && titleText) {
            var fullUrl = href.indexOf('http') === 0 ? href : (BAOZI_DOMAINS[currentDomainIndex] + href);
            htmlStr +=
              '<div class="comic-card" onclick=\'loadComicDetail("' + fullUrl.replace(/'/g, "\\'") + '","' + titleText.replace(/"/g, '&quot;') + '")\'>' +
                '<img class="comic-card-img" src="' + imgSrc + '" alt="' + titleText + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + titleText + '</div>' +
                  (chapterText ? '<div class="comic-card-chapter">' + chapterText + '</div>' : '') +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        if (count === 0) {
          showErrorWithActions('未能解析漫画列表数据', html);
          return;
        }

        content.innerHTML = htmlStr;
        showSourceInfo('数据来源: 包子漫画 (线路 ' + (currentProxyIndex + 1) + ')', 'ok');
        log('成功加载 ' + count + ' 部漫画');
      } catch (e) {
        log('加载列表失败: ' + e.message);
        showErrorWithActions('加载失败，请重试', e.message, true);
      }
    }

    // ==================== 搜索 ====================
    function doSearch() {
      var keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        loadComicList('recommend');
        return;
      }
      searchComic(keyword);
    }

    async function searchComic(keyword) {
      currentView = 'list';
      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在搜索 "' + keyword + '"...</p>' +
        '</div>';

      try {
        var path = '/search?q=' + encodeURIComponent(keyword);
        var html = await fetchComicHTML(path);
        var doc = parseHTML(html);

        var cards = [];
        var selectors = [
          '.comics-card',
          '.comic-card',
          '.card',
          '[class*="comic"][class*="card"]',
          '.search-result-item'
        ];

        for (var s = 0; s < selectors.length; s++) {
          var found = doc.querySelectorAll(selectors[s]);
          if (found.length >= 1) {
            cards = found;
            break;
          }
        }

        if (cards.length === 0) {
          content.innerHTML =
            '<div class="comic-error">' +
              '<i data-lucide="search-x"></i>' +
              '<p>未找到 "' + keyword + '" 相关漫画</p>' +
              '<div class="comic-error-actions">' +
                '<button class="comic-error-btn" onclick="loadComicList(\'recommend\')">' +
                  '<i data-lucide="arrow-left" style="width:14px;height:14px;"></i>返回推荐' +
                '</button>' +
              '</div>' +
            '</div>';
          lucide.createIcons();
          return;
        }

        var htmlStr = '<div class="comic-grid">';
        var count = 0;
        for (var c = 0; c < cards.length; c++) {
          var card = cards[c];
          var link = card.querySelector('a');
          var href = link ? link.getAttribute('href') : '';
          if (!href || href === '#') continue;

          var titleEls = card.querySelectorAll('[class*="title"], h3, h4');
          var titleText = '';
          for (var t = 0; t < titleEls.length; t++) {
            var txt = titleEls[t].textContent.trim();
            if (txt && txt.length > 1 && txt.length < 50) {
              titleText = txt;
              break;
            }
          }

          var img = card.querySelector('amp-img') || card.querySelector('img');
          var imgSrc = getImgSrc(img);

          if (href && imgSrc && titleText) {
            var fullUrl = href.indexOf('http') === 0 ? href : (BAOZI_DOMAINS[currentDomainIndex] + href);
            htmlStr +=
              '<div class="comic-card" onclick=\'loadComicDetail("' + fullUrl.replace(/'/g, "\\'") + '","' + titleText.replace(/"/g, '&quot;') + '")\'>' +
                '<img class="comic-card-img" src="' + imgSrc + '" alt="' + titleText + '" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' +
                '<div class="comic-card-info">' +
                  '<div class="comic-card-title">' + titleText + '</div>' +
                '</div>' +
              '</div>';
            count++;
          }
        }
        htmlStr += '</div>';

        if (count === 0) {
          content.innerHTML =
            '<div class="comic-error">' +
              '<i data-lucide="search-x"></i>' +
              '<p>未找到 "' + keyword + '" 相关漫画</p>' +
            '</div>';
          lucide.createIcons();
          return;
        }

        content.innerHTML = htmlStr;
        showSourceInfo('找到 ' + count + ' 个结果', 'ok');
      } catch (e) {
        showErrorWithActions('搜索失败', e.message, true);
      }
    }

    // ==================== 漫画详情 ====================
    async function loadComicDetail(comicUrl, fallbackTitle) {
      currentView = 'detail';
      currentComicUrl = comicUrl;
      currentComicTitle = fallbackTitle || '';
      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载漫画详情...</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchComicHTML(comicUrl);
        var doc = parseHTML(html);

        var titleText = '';
        var titleSelectors = ['.comics-detail__title', '.comic-title', 'h1', '.detail-title', '[class*="detail"][class*="title"]'];
        for (var t = 0; t < titleSelectors.length; t++) {
          var tel = doc.querySelector(titleSelectors[t]);
          if (tel && tel.textContent.trim()) {
            titleText = tel.textContent.trim();
            break;
          }
        }
        if (!titleText) titleText = fallbackTitle || '未知漫画';

        var authorText = '';
        var authorSelectors = ['.comics-detail__author', '.comic-author', '.author', '[class*="author"]'];
        for (var a = 0; a < authorSelectors.length; a++) {
          var ael = doc.querySelector(authorSelectors[a]);
          if (ael && ael.textContent.trim() && ael.textContent.trim().length < 50) {
            authorText = ael.textContent.trim();
            break;
          }
        }

        var descText = '';
        var descSelectors = ['.comics-detail__desc', '.comic-desc', '.description', '[class*="desc"]', '[class*="intro"]'];
        for (var d = 0; d < descSelectors.length; d++) {
          var del = doc.querySelector(descSelectors[d]);
          if (del && del.textContent.trim() && del.textContent.trim().length > 10) {
            descText = del.textContent.trim();
            break;
          }
        }

        var coverSrc = '';
        var coverSelectors = ['.comics-detail__cover amp-img', '.comic-cover amp-img', '.cover amp-img', '[class*="cover"] amp-img', '.pure-u-1-3 amp-img', '.comics-detail__cover img', '.comic-cover img'];
        for (var ci = 0; ci < coverSelectors.length; ci++) {
          var cel = doc.querySelector(coverSelectors[ci]);
          if (cel) {
            coverSrc = getImgSrc(cel);
            if (coverSrc) break;
          }
        }

        var tagsHtml = '';
        var tagContainer = doc.querySelector('.tag-list, .comic-tags, [class*="tag"]');
        if (tagContainer) {
          var tags = tagContainer.querySelectorAll('span, a, .tag');
          for (var ti = 0; ti < tags.length; ti++) {
            var ttxt = tags[ti].textContent.trim();
            if (ttxt && ttxt.length < 15) {
              tagsHtml += '<span class="comic-detail-tag">' + ttxt + '</span>';
            }
          }
        }

        var chapterLinks = [];
        var chapterSelectors = ['.comics-chapters a', '.chapter-list a', '.chaper-list a', '[class*="chapter"] a', '[class*="catalog"] a'];
        for (var cs = 0; cs < chapterSelectors.length; cs++) {
          var chs = doc.querySelectorAll(chapterSelectors[cs]);
          if (chs.length >= 5) {
            chapterLinks = chs;
            log('章节选择器: ' + chapterSelectors[cs] + ' (' + chs.length + '章)');
            break;
          }
        }

        currentChapters = [];
        for (var cl = 0; cl < chapterLinks.length; cl++) {
          var chLink = chapterLinks[cl];
          var chref = chLink.getAttribute('href');
          var chtext = chLink.textContent.trim();
          if (chref && chtext) {
            var chFullUrl = chref.indexOf('http') === 0 ? chref : (BAOZI_DOMAINS[currentDomainIndex] + chref);
            currentChapters.push({ url: chFullUrl, title: chtext });
          }
        }

        if (currentChapters.length > 2 && currentChapters[0].title > currentChapters[currentChapters.length - 1].title) {
          currentChapters.reverse();
        }

        var chapterHtml = '';
        for (var ch = 0; ch < currentChapters.length; ch++) {
          chapterHtml += '<div class="chapter-item" onclick="loadChapter(' + ch + ')">' + currentChapters[ch].title + '</div>';
        }

        content.innerHTML =
          '<div class="comic-detail">' +
            '<button class="comic-back-btn" onclick="goBackToList()">' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回列表' +
            '</button>' +
            '<div class="comic-detail-header">' +
              (coverSrc ? '<img class="comic-detail-cover" src="' + coverSrc + '" alt="' + titleText + '" referrerpolicy="no-referrer" onerror="this.style.display=\'none\'">' : '') +
              '<div class="comic-detail-meta">' +
                '<div class="comic-detail-title">' + titleText + '</div>' +
                (authorText ? '<div class="comic-detail-author">' + authorText + '</div>' : '') +
                '<div class="comic-detail-tags">' + tagsHtml + '</div>' +
                (descText ? '<div class="comic-detail-desc">' + descText + '</div>' : '') +
              '</div>' +
            '</div>' +
            '<h3 style="font-size:1.05rem;margin-bottom:12px;color:var(--text-primary);">章节列表 (' + currentChapters.length + '话)</h3>' +
            '<div class="chapter-list">' + chapterHtml + '</div>' +
          '</div>';
        lucide.createIcons();
      } catch (e) {
        showErrorWithActions('加载详情失败', e.message, true, [
          { text: '重新加载', action: 'loadComicDetail("' + comicUrl + '", "' + (fallbackTitle || '') + '")' },
          { text: '返回列表', action: 'goBackToList()' }
        ]);
      }
    }

    // ==================== 阅读器 ====================
    async function loadChapter(index) {
      currentView = 'reader';
      currentChapterIndex = index;
      var chapter = currentChapters[index];
      var content = document.getElementById('comicContent');
      content.innerHTML =
        '<div class="comic-loading">' +
          '<div class="spinner"></div>' +
          '<p>正在加载章节...</p>' +
          '<p class="comic-loading-tips">' + chapter.title + '</p>' +
        '</div>';
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        var html = await fetchComicHTML(chapter.url);
        var doc = parseHTML(html);

        var images = [];
        var containerSelectors = ['.comic-contain', '.comic-images', '.comic-content', '[class*="comic"][class*="content"]', '.main-content', 'article'];
        for (var cs = 0; cs < containerSelectors.length; cs++) {
          var container = doc.querySelector(containerSelectors[cs]);
          if (container) {
            var imgs = container.querySelectorAll('amp-img, img');
            for (var i = 0; i < imgs.length; i++) {
              var src = getImgSrc(imgs[i]);
              if (src && src.indexOf('http') === 0 && !src.match(/\.(js|css|ico|svg)$/i) && src.indexOf('placeholder') === -1 && src.length > 30) {
                images.push(src);
              }
            }
            if (images.length >= 3) {
              log('图片容器: ' + containerSelectors[cs] + ' (' + images.length + '张)');
              break;
            }
          }
        }

        if (images.length < 3) {
          var allImgs = doc.querySelectorAll('amp-img[src*="http"], img[src*="http"]');
          for (var ai = 0; ai < allImgs.length; ai++) {
            var asrc = getImgSrc(allImgs[ai]);
            if (asrc && asrc.indexOf('http') === 0 && !asrc.match(/\.(js|css|ico|svg)$/i) && asrc.length > 30) {
              var dup = false;
              for (var di = 0; di < images.length; di++) {
                if (images[di] === asrc) { dup = true; break; }
              }
              if (!dup) images.push(asrc);
            }
          }
        }

        var prevBtn = index > 0
          ? '<button onclick="loadChapter(' + (index - 1) + ')"><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>'
          : '<button disabled><i data-lucide="chevron-left" style="width:16px;height:16px;"></i>上一话</button>';
        var nextBtn = index < currentChapters.length - 1
          ? '<button onclick="loadChapter(' + (index + 1) + ')">下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>'
          : '<button disabled>下一话<i data-lucide="chevron-right" style="width:16px;height:16px;"></i></button>';

        var imagesHtml = '';
        for (var img = 0; img < images.length; img++) {
          imagesHtml += '<img src="' + images[img] + '" alt="第' + (img + 1) + '页" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display=\'none\'">';
        }

        content.innerHTML =
          '<div class="comic-reader">' +
            '<button class="comic-back-btn" onclick=\'loadComicDetail("' + currentComicUrl.replace(/'/g, "\\'") + '", "' + (currentComicTitle || '').replace(/"/g, '&quot;') + '")\'>' +
              '<i data-lucide="arrow-left" style="width:16px;height:16px;"></i>' +
              '返回详情' +
            '</button>' +
            '<div class="comic-reader-title">' + chapter.title + '</div>' +
            '<div class="comic-reader-nav">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
            '<div class="comic-reader-images">' +
              (imagesHtml || '<p style="text-align:center;color:var(--text-muted);padding:40px;">本章节暂无图片数据</p>') +
            '</div>' +
            '<div class="comic-reader-nav" style="margin-top:24px;">' + prevBtn +
              '<span class="nav-center">' + (index + 1) + ' / ' + currentChapters.length + '</span>' +
              nextBtn +
            '</div>' +
          '</div>';
        lucide.createIcons();
      } catch (e) {
        showErrorWithActions('加载章节失败', e.message, true, [
          { text: '重试', action: 'loadChapter(' + index + ')' },
          { text: '返回详情', action: 'loadComicDetail(currentComicUrl, currentComicTitle)' }
        ]);
      }
    }

    // ==================== 错误展示 ====================
    function showErrorWithActions(title, detail, showDetail, actions) {
      var content = document.getElementById('comicContent');
      showSourceInfo('加载失败', 'error');

      var actionsHtml = '';
      if (actions && actions.length > 0) {
        actionsHtml = '<div class="comic-error-actions">';
        for (var i = 0; i < actions.length; i++) {
          var btnClass = i === 0 ? 'comic-error-btn primary' : 'comic-error-btn';
          actionsHtml += '<button class="' + btnClass + '" onclick="' + actions[i].action + '">' + actions[i].text + '</button>';
        }
        actionsHtml += '</div>';
      } else {
        actionsHtml =
          '<div class="comic-error-actions">' +
            '<button class="comic-error-btn primary" onclick="loadComicList(\'recommend\')">' +
              '<i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>重新加载' +
            '</button>' +
            '<a class="comic-error-btn" href="https://www.baozimh.com" target="_blank" rel="noopener">' +
              '<i data-lucide="external-link" style="width:14px;height:14px;"></i>前往官网' +
            '</a>' +
          '</div>';
      }

      var detailHtml = '';
      if (showDetail && detail) {
        detailHtml = '<div class="comic-error-detail">' + (detail.substring(0, 500)) + '</div>';
      }

      content.innerHTML =
        '<div class="comic-error">' +
          '<i data-lucide="wifi-off"></i>' +
          '<p>' + title + '</p>' +
          '<p style="font-size:0.82rem;color:var(--text-muted);margin-top:8px;">可能原因：CORS代理不稳定或源站反爬限制</p>' +
          actionsHtml +
          detailHtml +
        '</div>';
      lucide.createIcons();
    }

    // ==================== 导航 ====================
    function goBackToList() {
      currentView = 'list';
      var activeTag = document.querySelector('.comic-tag.active');
      loadComicList(activeTag ? activeTag.dataset.type : 'recommend');
    }

    var tagElements = document.querySelectorAll('.comic-tag');
    for (var ti = 0; ti < tagElements.length; ti++) {
      tagElements[ti].addEventListener('click', function() {
        var allTags = document.querySelectorAll('.comic-tag');
        for (var at = 0; at < allTags.length; at++) {
          allTags[at].classList.remove('active');
        }
        this.classList.add('active');
        loadComicList(this.dataset.type);
      });
    }

    // ==================== 初始化 ====================
    lucide.createIcons();
    log('页面初始化，开始加载...');
    loadComicList('recommend');
  </script>
</body>
</html>
