  <meta name="keywords" content="音乐,歌单,在线听歌,歌曲海,搜索,蘇魚">

  <style>
    .music-page {
      padding: 100px 0 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .music-page .container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .music-embed-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--border-color);
      border-bottom: none;
      overflow: hidden;
      position: relative;
      min-height: 500px;
    }

    .music-embed {
      width: 100%;
      flex: 1;
      border: none;
      min-height: 500px;
    }

    .music-embed-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .music-embed-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .music-embed-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .music-embed-loading span {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* 搜索栏 */
    .music-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .music-search-wrap {
      flex: 1;
      position: relative;
      min-width: 200px;
    }

    .music-search-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .music-search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 42px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .music-search-wrap input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .music-search-wrap input::placeholder {
      color: var(--text-muted);
    }

    .music-bar-btn {
      padding: 10px 18px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .music-bar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .music-bar-btn i {
      width: 18px;
      height: 18px;
    }

    /* 标签行 */
    .music-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .music-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .music-tag:hover {
      border-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
      color: var(--accent-primary);
    }

    .music-tag i {
      width: 12px;
      height: 12px;
    }

    .music-tag.hot {
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: white;
      border: none;
    }

    .music-tag.hot:hover {
      box-shadow: 0 3px 10px rgba(239, 68, 68, 0.3);
      color: white;
    }

    .music-tag.artist {
      background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
      color: white;
      border: none;
    }

    .music-tag.artist:hover {
      box-shadow: 0 3px 10px rgba(99, 102, 241, 0.3);
      color: white;
    }

    /* 搜索历史 */
    .music-history {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .music-history-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border-radius: 14px;
      color: var(--text-secondary);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .music-history-tag:hover {
      color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
    }

    .music-history-tag .close-btn {
      width: 14px;
      height: 14px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }

    .music-history-tag .close-btn:hover {
      opacity: 1;
    }

    .music-info {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      padding: 10px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    @media (max-width: 768px) {
      .music-page {
        padding: 85px 0 0;
      }
      .music-embed-wrap {
        min-height: 400px;
        border-radius: 8px 8px 0 0;
      }
      .music-embed {
        min-height: 400px;
      }
      .music-bar {
        flex-direction: column;
      }
      .music-search-wrap {
        width: 100%;
      }
      .music-bar-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">蘇魚</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#skills">技能</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="index.html#hobbies">爱好</a></li>
        <li><a href="novel.html">小说</a></li>
        <li><a href="music.html" class="active">音乐</a></li>
        <li><a href="tools.html">工具</a></li>
        <li><a href="index.html#gallery">相册</a></li>
        <li><a href="index.html#comments">留言</a></li>
        <li class="nav-divider"></li>
        <li>
          <button class="theme-toggle" id="themeToggleMobile" title="切换主题">
            <i data-lucide="moon"></i>
          </button>
        </li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="music-page">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">🎵 音乐电台</h1>
        <p class="section-desc">搜歌 → 选歌 → 直接在当前页面听</p>
      </div>

      <!-- 搜索栏 -->
      <div class="music-bar">
        <div class="music-search-wrap">
          <i data-lucide="search"></i>
          <input type="text" id="musicSearchInput" placeholder="输入歌曲名或歌手..."
                 autocomplete="off" onkeydown="if(event.key==='Enter') doSearch()">
        </div>
        <button class="music-bar-btn" onclick="doSearch()">
          <i data-lucide="search"></i>
          <span>搜歌</span>
        </button>
      </div>

      <!-- 搜索历史 -->
      <div class="music-history" id="musicHistory"></div>

      <!-- 热门歌曲 -->
      <div class="music-tags" id="hotTags"></div>

      <!-- 热门歌手 -->
      <div class="music-tags" id="artistTags"></div>

      <!-- 歌曲海嵌入 -->
      <div class="music-embed-wrap">
        <div class="music-embed-loading" id="embedLoading">
          <div class="spinner"></div>
          <span>加载中...</span>
        </div>
        <iframe class="music-embed" id="musicEmbed"
                src="https://www.gequhai.com/"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                loading="lazy"
                onload="document.getElementById('embedLoading').classList.add('hide')"
                title="歌曲海音乐搜索"></iframe>
      </div>
      <div class="music-info">
        歌曲海 · 搜歌后选一首，直接在当前页面播放
      </div>
    </div>
  </div>

  <script>
    // ==================== 热门标签 ====================
    const hotSearches = [
      '晴天','稻香','七里香','夜曲','青花瓷','告白气球',
      '江南','演员','十年','光年之外','泡沫','消愁',
      '起风了','绿色','错位时空','踏山河','半生雪','少年'
    ];
    const hotArtists = [
      '周杰伦','林俊杰','薛之谦','陈奕迅','邓紫棋',
      '毛不易','许嵩','李荣浩','刘德华','Beyond'
    ];

    const hotTags = document.getElementById('hotTags');
    const artistTags = document.getElementById('artistTags');

    hotSearches.forEach(song => {
      const tag = document.createElement('span');
      tag.className = 'music-tag hot';
      tag.innerHTML = `<i data-lucide="trending-up"></i><span>${song}</span>`;
      tag.addEventListener('click', () => searchGequhai(song));
      hotTags.appendChild(tag);
    });

    hotArtists.forEach(artist => {
      const tag = document.createElement('span');
      tag.className = 'music-tag artist';
      tag.innerHTML = `<i data-lucide="mic-2"></i><span>${artist}</span>`;
      tag.addEventListener('click', () => searchGequhai(artist));
      artistTags.appendChild(tag);
    });

    // ==================== 搜索历史 ====================
    const historyContainer = document.getElementById('musicHistory');
    const HISTORY_KEY = 'suyu_music_history';
    let searchHistory = [];

    function loadHistory() {
      try {
        const data = localStorage.getItem(HISTORY_KEY);
        searchHistory = data ? JSON.parse(data) : [];
      } catch(e) { searchHistory = []; }
      renderHistory();
    }

    function renderHistory() {
      if (searchHistory.length === 0) {
        historyContainer.style.display = 'none';
        return;
      }
      historyContainer.style.display = 'flex';
      historyContainer.innerHTML = searchHistory.map(q =>
        `<span class="music-history-tag" onclick="searchGequhai('${q.replace(/'/g, "\\'")}')">
          <i data-lucide="clock" style="width:12px;height:12px"></i>${q}
          <i data-lucide="x" class="close-btn" onclick="event.stopPropagation();removeHistory('${q.replace(/'/g, "\\'")}')"></i>
        </span>`
      ).join('');
      lucide.createIcons();
    }

    function addHistory(query) {
      searchHistory = searchHistory.filter(q => q !== query);
      searchHistory.unshift(query);
      if (searchHistory.length > 8) searchHistory = searchHistory.slice(0, 8);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
      renderHistory();
    }

    function removeHistory(query) {
      searchHistory = searchHistory.filter(q => q !== query);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(searchHistory));
      renderHistory();
    }

    // ==================== 搜索 ====================
    const searchInput = document.getElementById('musicSearchInput');
    const musicEmbed = document.getElementById('musicEmbed');
    const embedLoading = document.getElementById('embedLoading');

    function doSearch() {
      const query = searchInput.value.trim();
      if (!query) { searchInput.focus(); return; }
      searchGequhai(query);
    }

    function searchGequhai(query) {
      if (!query) return;
      musicEmbed.src = `https://www.gequhai.com/s/${encodeURIComponent(query)}`;
      embedLoading.classList.remove('hide');
      addHistory(query);
      searchInput.value = query;
    }

    // ==================== 如果是播放页链接, 直接导航到播放页 ====================
    // 检测点击的链接如果是播放页, 就同步标题
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'song_playing') {
        document.title = e.data.title + ' - 音乐电台 | 蘇魚';
      }
    });

    loadHistory();
    lucide.createIcons();
  </script>
</body>
