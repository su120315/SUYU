  <div class="music-page">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">🎵 音乐电台</h1>
        <p class="section-desc">点歌即播，尽在掌握</p>
      </div>

      <!-- 搜索栏 -->
      <div class="music-search-wrap" style="max-width:500px;margin:0 auto 20px;position:relative">
        <i data-lucide="search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-muted);pointer-events:none"></i>
        <input type="text" id="musicSearch" placeholder="搜索歌曲或歌手..."
               style="width:100%;padding:12px 16px 12px 44px;border:1px solid var(--border-color);border-radius:12px;background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;font-size:1rem;box-sizing:border-box"
               oninput="doSearch()">
        <button id="musicRandomBtn" title="随机一首"
                style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));color:white;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;gap:4px">
          <i data-lucide="shuffle" style="width:16px;height:16px"></i><span>随机</span>
        </button>
      </div>

      <!-- 自定义播放 -->
      <div style="max-width:500px;margin:-10px auto 20px;display:flex;gap:8px;align-items:center">
        <input type="text" id="customSongId" placeholder="粘贴网易云歌曲ID或链接..." 
               style="flex:1;padding:8px 12px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;font-size:0.85rem;box-sizing:border-box"
               onkeydown="if(event.key==='Enter') playCustom()">
        <button onclick="playCustom()" style="padding:8px 14px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:8px;cursor:pointer;font-size:0.85rem;white-space:nowrap;transition:all 0.2s"
                onmouseover="this.style.borderColor='var(--accent-primary)'" onmouseout="this.style.borderColor='var(--border-color)'">
          播歌
        </button>
      </div>

      <!-- 统计 -->
      <div class="music-stats" style="text-align:center;color:var(--text-secondary);font-size:0.9rem;margin-bottom:20px">
        共 <strong id="songCount" style="color:var(--accent-primary)">0</strong> 首歌
        <span id="statFilter" style="display:none"> · 筛选后 <strong id="filterCount" style="color:var(--accent-primary)">0</strong> 首</span>
      </div>

      <!-- 歌单列表 -->
      <div class="music-list" id="musicList" style="max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:6px"></div>
    </div>
  </div>

  <!-- 底部播放器 -->
  <div class="music-page-player">
    <div class="music-page-player-inner" style="max-width:700px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div class="mp-cover" id="mpCover">
        <i data-lucide="music"></i>
      </div>
      <div class="mp-info" style="flex:1;min-width:0">
        <div class="mp-title" id="mpTitle">选择一首歌</div>
        <div class="mp-artist" id="mpArtist">点击播放</div>
      </div>
      <div class="mp-progress" style="display:flex;align-items:center;gap:10px;flex:1;max-width:280px">
        <span class="mp-time" style="font-size:0.75rem;color:var(--text-muted);min-width:36px" id="mpCurrentTime">00:00</span>
        <div class="mp-progress-bar" id="mpProgressBar" style="flex:1;height:4px;background:var(--bg-tertiary);border-radius:4px;cursor:pointer;position:relative">
          <div class="mp-progress-fill" id="mpProgressFill" style="height:100%;background:linear-gradient(90deg,var(--accent-primary),var(--accent-secondary));border-radius:4px;width:0%"></div>
        </div>
        <span class="mp-time" style="font-size:0.75rem;color:var(--text-muted);min-width:36px" id="mpDuration">00:00</span>
      </div>
      <div class="mp-controls" style="display:flex;align-items:center;gap:6px">
        <button class="mp-btn" id="mpPrev"><i data-lucide="skip-back"></i></button>
        <button class="mp-btn mp-play-btn" id="mpPlayBtn"><i data-lucide="play" id="mpPlayIcon"></i></button>
        <button class="mp-btn" id="mpNext"><i data-lucide="skip-forward"></i></button>
      </div>
    </div>
  </div>

      {title:'山外小楼夜听雨',artist:'任然',url:'https://music.163.com/song/media/outer/url?id=423514467.mp3'},
      {title:'空空如也',artist:'任然',url:'https://music.163.com/song/media/outer/url?id=530656218.mp3'},
      {title:'飞鸟和蝉',artist:'任然',url:'https://music.163.com/song/media/outer/url?id=1447832119.mp3'},
      // 网络热歌
      {title:'孤勇者',artist:'陈奕迅',url:'https://music.163.com/song/media/outer/url?id=1901376647.mp3'},
      {title:'白月光与朱砂痣',artist:'大籽',url:'https://music.163.com/song/media/outer/url?id=1814420893.mp3'},
      {title:'莫问归期',artist:'胡夏',url:'https://music.163.com/song/media/outer/url?id=1456662245.mp3'},
      {title:'只要平凡',artist:'张杰/张碧晨',url:'https://music.163.com/song/media/outer/url?id=1341259847.mp3'},
      {title:'后来遇见他',artist:'胡66',url:'https://music.163.com/song/media/outer/url?id=1439353918.mp3'},
      {title:'执迷不悟',artist:'铁脑袋',url:'https://music.163.com/song/media/outer/url?id=1480408355.mp3'},
      {title:'大风吹',artist:'刘惜君',url:'https://music.163.com/song/media/outer/url?id=1839496156.mp3'},
      {title:'下坠Falling',artist:'Corki',url:'https://music.163.com/song/media/outer/url?id=1418368793.mp3'},
      {title:'氧化氢',artist:'李尖尖',url:'https://music.163.com/song/media/outer/url?id=1446281853.mp3'},
      {title:'一路生花',artist:'温奕心',url:'https://music.163.com/song/media/outer/url?id=1843420999.mp3'},
    ];

    const musicList = document.getElementById('musicList');
    const searchInput = document.getElementById('musicSearch');
    const songCount = document.getElementById('songCount');
    const filterCount = document.getElementById('filterCount');
    const statFilter = document.getElementById('statFilter');
    const titleEl = document.getElementById('mpTitle');
    const artistEl = document.getElementById('mpArtist');
    const playBtn = document.getElementById('mpPlayBtn');
    const playIcon = document.getElementById('mpPlayIcon');
    const prevBtn = document.getElementById('mpPrev');
    const nextBtn = document.getElementById('mpNext');
    const progressFill = document.getElementById('mpProgressFill');
    const progressBar = document.getElementById('mpProgressBar');
    const currentTimeEl = document.getElementById('mpCurrentTime');
    const durationEl = document.getElementById('mpDuration');
    const coverEl = document.getElementById('mpCover');

    let currentIndex = -1;
    let isPlaying = false;
    const audio = new Audio();
    let searchResults = [];

    function formatTime(s) {
      if (!s || isNaN(s)) return '00:00';
      return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
    }

    function getDisplayList() {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return playlist;
      return playlist.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
    }

    function render() {
      const list = getDisplayList();
      searchResults = list;
      songCount.textContent = playlist.length;
      
      if (searchInput.value.trim()) {
        statFilter.style.display = 'inline';
        filterCount.textContent = list.length;
      } else {
        statFilter.style.display = 'none';
      }

      if (list.length === 0) {
        musicList.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-muted)"><i data-lucide="music" style="width:48px;height:48px;margin-bottom:16px;opacity:0.4"></i><p>没有找到相关歌曲</p></div>';
        lucide.createIcons();
        return;
      }

      musicList.innerHTML = list.map((song, i) => {
        const idx = playlist.indexOf(song);
        const active = idx === currentIndex;
        return `<div class="music-item${active?' playing':''}" data-index="${idx}">
          <div class="music-item-cover"><i data-lucide="music"></i></div>
          <div class="music-item-info">
            <div class="music-item-title">${escapeHtml(song.title)}</div>
            <div class="music-item-artist">${escapeHtml(song.artist)}</div>
          </div>
          <button class="music-item-play"><i data-lucide="${active&&isPlaying?'pause':'play'}"></i></button>
        </div>`;
      }).join('');
      lucide.createIcons();
      bindItems();
    }

    function bindItems() {
      musicList.querySelectorAll('.music-item').forEach(item => {
        item.addEventListener('click', e => {
          if (e.target.closest('.music-item-play')) return;
          const idx = parseInt(item.getAttribute('data-index'));
          playIdx(idx);
        });
        item.querySelector('.music-item-play').addEventListener('click', e => {
          e.stopPropagation();
          const idx = parseInt(item.getAttribute('data-index'));
          if (idx === currentIndex && isPlaying) { pause(); }
          else { playIdx(idx); }
        });
      });
    }

    function playIdx(idx) {
      if (idx < 0 || idx >= playlist.length) return;
      currentIndex = idx;
      const song = playlist[idx];
      titleEl.textContent = song.title;
      artistEl.textContent = song.artist;
      coverEl.classList.add('playing');
      audio.src = song.url;
      audio.play().catch(() => {});
      isPlaying = true;
      playIcon.setAttribute('data-lucide', 'pause');
      lucide.createIcons();
      render();
      setTimeout(() => {
        document.querySelector('.music-item.playing')?.scrollIntoView({behavior:'smooth',block:'center'});
      }, 100);
    }

    function pause() {
      audio.pause();
      isPlaying = false;
      playIcon.setAttribute('data-lucide', 'play');
      coverEl.classList.remove('playing');
      lucide.createIcons();
      render();
    }

    function togglePlay() {
      if (currentIndex === -1) { playIdx(0); return; }
      if (isPlaying) { pause(); }
      else {
        audio.play().catch(() => {});
        isPlaying = true;
        playIcon.setAttribute('data-lucide', 'pause');
        coverEl.classList.add('playing');
        lucide.createIcons();
        render();
      }
    }

    function nextSong() {
      const list = getDisplayList();
      if (list.length === 0) return;
      const curFiltered = list.findIndex(s => playlist.indexOf(s) === currentIndex);
      const next = (curFiltered + 1) % list.length;
      playIdx(playlist.indexOf(list[next]));
    }

    function prevSong() {
      const list = getDisplayList();
      if (list.length === 0) return;
      const curFiltered = list.findIndex(s => playlist.indexOf(s) === currentIndex);
      const prev = (curFiltered - 1 + list.length) % list.length;
      playIdx(playlist.indexOf(list[prev]));
    }

    function doSearch() { render(); }

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    // Audio events
    audio.addEventListener('ended', nextSong);
    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime/audio.duration*100)+'%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });
    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    progressBar.addEventListener('click', e => {
      if (!audio.duration) return;
      const r = progressBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX-r.left)/r.width) * audio.duration;
    });

    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevSong);
    nextBtn.addEventListener('click', nextSong);

    // 随机播放
    document.getElementById('musicRandomBtn').addEventListener('click', () => {
      const list = getDisplayList();
      if (list.length === 0) return;
      const rand = Math.floor(Math.random() * list.length);
      playIdx(playlist.indexOf(list[rand]));
    });

    // 自定义播放
    function playCustom() {
      const input = document.getElementById('customSongId');
      let val = input.value.trim();
      if (!val) return;
      // 从链接中提取ID: https://music.163.com/song?id=186016 或 https://music.163.com/#/song?id=186016 或纯数字
      const match = val.match(/id=(\d+)/) || val.match(/(\d+)/);
      if (match) {
        const id = match[1];
        const url = 'https://music.163.com/song/media/outer/url?id=' + id + '.mp3';
        const title = prompt('给这首歌起个名字(可选):') || '自定义歌曲';
        const artist = prompt('歌手名(可选):') || '未知';
        // 临时添加到歌单并播放
        const idx = playlist.length;
        playlist.push({title, artist, url});
        playIdx(idx);
        render();
        input.value = '';
      } else {
        alert('请输入正确的网易云歌曲ID或链接');
      }
    }

    // 搜索防抖
    let searchTimer;
    searchInput.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 150); });

    render();
  </script>
  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
