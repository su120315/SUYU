  <script src="https://unpkg.com/lucide@0.460.0"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .music-embed {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: var(--bg-secondary);
      min-height: 600px;
    }

    .music-embed-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .music-embed-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .music-embed-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    .music-embed-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .music-embed-loading span {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .music-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .music-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--text-primary);
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .music-tag:hover {
      border-color: var(--accent-primary);
      background: rgba(99, 102, 241, 0.08);
      color: var(--accent-primary);
      transform: translateY(-2px);
    }

    .music-tag i {
      width: 14px;
      height: 14px;
    }

    .music-tag.hot {
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: white;
      border: none;
    }

    .music-tag.hot:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
      color: white;
    }

    .music-tag.artist {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
    }

    .music-tag.artist:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      color: white;
    }

    .music-quick-search {
      display: flex;
      gap: 8px;
      max-width: 500px;
      margin: 0 auto 16px;
    }

    .music-quick-search input {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .music-quick-search input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .music-quick-search input::placeholder {
      color: var(--text-muted);
    }

    .music-quick-search button {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .music-quick-search button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .music-quick-search button i {
      width: 18px;
      height: 18px;
    }

    .music-embed-info {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 12px;
    }

    @media (max-width: 768px) {
      .music-embed {
        min-height: 500px;
      }

      .music-quick-search {
        flex-direction: column;
      }

      .music-quick-search button {
        justify-content: center;
      }

      .music-tags {
        gap: 6px;
      }

      .music-tag {
        padding: 6px 12px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">蘇魚</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#skills">技能</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="index.html#hobbies">爱好</a></li>
        <li><a href="novel.html">小说</a></li>
        <li><a href="music.html" class="active">音乐</a></li>
        <li><a href="tools.html">工具</a></li>
        <li><a href="index.html#gallery">相册</a></li>
        <li><a href="index.html#comments">留言</a></li>
        <li class="nav-divider"></li>
        <li>
          <button class="theme-toggle" id="themeToggleMobile" title="切换主题">
            <i data-lucide="moon"></i>
          </button>
        </li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="music-page">
    <div class="container">
      <div class="section-header">
        <h1 class="section-title">🎵 音乐电台</h1>
        <p class="section-desc">搜索海量歌曲，想听什么搜什么</p>
      </div>

      <!-- 搜索栏 -->
      <div class="music-quick-search">
        <input type="text" id="musicSearchInput" placeholder="输入歌曲名或歌手..." autocomplete="off"
               onkeydown="if(event.key==='Enter') doSearch()">
        <button onclick="doSearch()">
          <i data-lucide="search"></i>
          <span>搜歌</span>
        </button>
      </div>

      <!-- 热门搜索标签 -->
      <div class="music-tags" id="hotTags"></div>

      <!-- 歌手快速入口 -->
      <div class="music-tags" id="artistTags" style="margin-bottom: 24px;"></div>

      <!-- 歌曲海嵌入区域 -->
      <div class="music-embed-wrap">
        <div class="music-embed-loading" id="embedLoading">
          <div class="spinner"></div>
          <span>加载中...</span>
        </div>
        <iframe class="music-embed" id="musicEmbed" src="https://www.gequhai.com/"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                loading="lazy"
                onload="document.getElementById('embedLoading').classList.add('hide')"
                title="歌曲海音乐搜索"></iframe>
      </div>
      <p class="music-embed-info">数据来源：<a href="https://www.gequhai.com/" target="_blank" rel="noopener" style="color:var(--accent-primary)">歌曲海</a> · 点击歌曲进入详情页即可试听</p>
    </div>
  </div>

  <script>
    const hotSearches = [
      '晴天', '稻香', '七里香', '夜曲', '青花瓷', '告白气球',
      '江南', '演员', '十年', '光年之外', '泡沫', '消愁',
      '起风了', '绿色', '错位时空', '踏山河', '半生雪', '少年'
    ];

    const hotArtists = [
      '周杰伦', '林俊杰', '薛之谦', '陈奕迅', '邓紫棋',
      '毛不易', '许嵩', '李荣浩', '刘德华', 'Beyond'
    ];

    const hotTags = document.getElementById('hotTags');
    const artistTags = document.getElementById('artistTags');
    const searchInput = document.getElementById('musicSearchInput');
    const musicEmbed = document.getElementById('musicEmbed');

    // 热门搜索标签
    hotSearches.forEach(song => {
      const tag = document.createElement('a');
      tag.className = 'music-tag hot';
      tag.href = `https://www.gequhai.com/s/${encodeURIComponent(song)}`;
      tag.target = '_blank';
      tag.rel = 'noopener';
      tag.innerHTML = `<i data-lucide="trending-up"></i><span>${song}</span>`;
      hotTags.appendChild(tag);
    });

    // 歌手标签
    hotArtists.forEach(artist => {
      const tag = document.createElement('a');
      tag.className = 'music-tag artist';
      tag.href = `https://www.gequhai.com/s/${encodeURIComponent(artist)}`;
      tag.target = '_blank';
      tag.rel = 'noopener';
      tag.innerHTML = `<i data-lucide="mic-2"></i><span>${artist}</span>`;
      artistTags.appendChild(tag);
    });

    // 搜索函数
    function doSearch() {
      const query = searchInput.value.trim();
      if (!query) {
        searchInput.focus();
        return;
      }
      musicEmbed.src = `https://www.gequhai.com/s/${encodeURIComponent(query)}`;
      document.getElementById('embedLoading').classList.remove('hide');
    }

    lucide.createIcons();
  </script>
</body>
</html>
