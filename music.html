      { title: '胡广生', artist: '任素汐', album: '胡广生', url: 'https://music.163.com/song/media/outer/url?id=1325905246.mp3' },
      { title: '错位时空', artist: '艾辰', album: '错位时空', url: 'https://music.163.com/song/media/outer/url?id=1491428739.mp3' },
      { title: '无人之岛', artist: '任然', album: '无人之岛', url: 'https://music.163.com/song/media/outer/url?id=1330632552.mp3' },
      { title: '想见你想见你想见你', artist: '八三夭', album: '想见你', url: 'https://music.163.com/song/media/outer/url?id=1416756148.mp3' },
      { title: '我曾', artist: '隔壁老樊', album: '我曾', url: 'https://music.163.com/song/media/outer/url?id=1354472608.mp3' },
      { title: '生僻字', artist: '陈柯宇', album: '生僻字', url: 'https://music.163.com/song/media/outer/url?id=1338211987.mp3' },
      { title: '少年', artist: '梦然', album: '少年', url: 'https://music.163.com/song/media/outer/url?id=1426254238.mp3' },
      { title: '你的答案', artist: '阿冗', album: '你的答案', url: 'https://music.163.com/song/media/outer/url?id=1403555314.mp3' }
    ];

    const musicList = document.getElementById('musicList');
    const searchInput = document.getElementById('musicSearch');
    const songCount = document.getElementById('songCount');
    const coverEl = document.getElementById('mpCover');
    const titleEl = document.getElementById('mpTitle');
    const artistEl = document.getElementById('mpArtist');
    const playBtn = document.getElementById('mpPlayBtn');
    const playIcon = document.getElementById('mpPlayIcon');
    const prevBtn = document.getElementById('mpPrev');
    const nextBtn = document.getElementById('mpNext');
    const progressFill = document.getElementById('mpProgressFill');
    const progressBar = document.getElementById('mpProgressBar');
    const currentTimeEl = document.getElementById('mpCurrentTime');
    const durationEl = document.getElementById('mpDuration');

    let currentIndex = -1;
    let isPlaying = false;
    let audio = new Audio();
    let currentSongId = null;

    function formatTime(s) {
      if (!s || isNaN(s)) return '00:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    }

    function renderSongs(songs) {
      if (songs.length === 0) {
        musicList.innerHTML = '<div class="music-empty"><i data-lucide="music"></i><p>没有找到相关歌曲</p></div>';
        lucide.createIcons();
        return;
      }
      musicList.innerHTML = songs.map((song, i) => {
        const idx = playlist.indexOf(song);
        const isActive = idx === currentIndex;
        return `
          <div class="music-item${isActive ? ' playing' : ''}" data-index="${idx}">
            <div class="music-item-cover">
              <i data-lucide="music"></i>
            </div>
            <div class="music-item-info">
              <div class="music-item-title">${escapeHtml(song.title)}</div>
              <div class="music-item-artist">${escapeHtml(song.artist)}</div>
            </div>
            <span class="music-item-album">${escapeHtml(song.album || '')}</span>
            <button class="music-item-play" title="播放">
              <i data-lucide="${isActive && isPlaying ? 'pause' : 'play'}"></i>
            </button>
          </div>
        `;
      }).join('');
      songCount.textContent = songs.length;
      lucide.createIcons();
      bindSongEvents();
    }

    function bindSongEvents() {
      musicList.querySelectorAll('.music-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.music-item-play')) return;
          const idx = parseInt(item.getAttribute('data-index'));
          playSong(idx);
        });
        const playBtn = item.querySelector('.music-item-play');
        playBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(item.getAttribute('data-index'));
          if (idx === currentIndex && isPlaying) {
            pauseSong();
          } else {
            playSong(idx);
          }
        });
      });
    }

    function playSong(index) {
      if (index < 0 || index >= playlist.length) return;
      currentIndex = index;
      currentSongId = index;
      const song = playlist[index];
      
      titleEl.textContent = song.title;
      artistEl.textContent = song.artist;
      coverEl.classList.add('playing');
      
      audio.src = song.url;
      audio.play().catch(e => {
        console.log('播放失败:', e);
      });
      isPlaying = true;
      playIcon.setAttribute('data-lucide', 'pause');
      lucide.createIcons();
      updateRenderHighlight();
      scrollToCurrent();
    }

    function pauseSong() {
      audio.pause();
      isPlaying = false;
      playIcon.setAttribute('data-lucide', 'play');
      coverEl.classList.remove('playing');
      lucide.createIcons();
      updateRenderHighlight();
    }

    function togglePlay() {
      if (currentIndex === -1) {
        playSong(0);
        return;
      }
      if (isPlaying) {
        pauseSong();
      } else {
        audio.play().catch(e => console.log(e));
        isPlaying = true;
        playIcon.setAttribute('data-lucide', 'pause');
        coverEl.classList.add('playing');
        lucide.createIcons();
        updateRenderHighlight();
      }
    }

    function playNext() {
      const currentSongs = getFilteredSongs();
      if (currentSongs.length === 0) return;
      const currentFilteredIdx = currentSongs.findIndex(s => playlist.indexOf(s) === currentIndex);
      const nextFilteredIdx = (currentFilteredIdx + 1) % currentSongs.length;
      const nextSong = currentSongs[nextFilteredIdx];
      playSong(playlist.indexOf(nextSong));
    }

    function playPrev() {
      const currentSongs = getFilteredSongs();
      if (currentSongs.length === 0) return;
      const currentFilteredIdx = currentSongs.findIndex(s => playlist.indexOf(s) === currentIndex);
      const prevFilteredIdx = (currentFilteredIdx - 1 + currentSongs.length) % currentSongs.length;
      const prevSong = currentSongs[prevFilteredIdx];
      playSong(playlist.indexOf(prevSong));
    }

    function getFilteredSongs() {
      const query = searchInput.value.trim().toLowerCase();
      if (!query) return playlist;
      return playlist.filter(s => 
        s.title.toLowerCase().includes(query) || 
        s.artist.toLowerCase().includes(query)
      );
    }

    function updateRenderHighlight() {
      const items = musicList.querySelectorAll('.music-item');
      items.forEach(item => {
        const idx = parseInt(item.getAttribute('data-index'));
        item.classList.toggle('playing', idx === currentIndex);
        const btn = item.querySelector('.music-item-play i');
        if (btn) {
          if (idx === currentIndex && isPlaying) {
            btn.setAttribute('data-lucide', 'pause');
          } else {
            btn.setAttribute('data-lucide', 'play');
          }
        }
      });
      lucide.createIcons();
    }

    function scrollToCurrent() {
      const activeItem = musicList.querySelector('.music-item.playing');
      if (activeItem) {
        activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function doSearch() {
      const filtered = getFilteredSongs();
      renderSongs(filtered);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Audio events
    audio.addEventListener('ended', playNext);
    audio.addEventListener('error', () => {
      console.log('音频加载失败');
    });
    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = pct + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });
    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    // 进度条点击
    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });

    // Search input
    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 200);
    });

    // Player buttons
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', playPrev);
    nextBtn.addEventListener('click', playNext);

    // 初始化
    renderSongs(playlist);
    lucide.createIcons();
  </script>
