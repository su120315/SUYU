<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="referrer" content="no-referrer">
  <title>贪吃蛇 | 蘇魚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest" defer onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js';"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --grid-size: 20;
      --cell-size: 24px;
      --snake-color: #6366f1;
      --food-color: #10b981;
      --bg-grid: rgba(255,255,255,0.05);
      --bg-cell: rgba(255,255,255,0.02);
    }
    .dark-mode {
      --bg-grid: rgba(255,255,255,0.08);
      --bg-cell: rgba(255,255,255,0.04);
    }
    .snake-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .snake-header {
      text-align: center;
    }
    .snake-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      font-family: var(--font-heading);
    }
    .snake-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .snake-score-bar {
      display: flex;
      gap: 30px;
      font-size: 1rem;
      font-weight: 500;
    }
    .snake-score {
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snake-score-value {
      color: var(--accent-primary);
      font-size: 1.3rem;
    }
    .snake-highscore {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snake-game-area {
      position: relative;
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border: 1px solid var(--bg-tertiary);
    }
    .snake-grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-size), var(--cell-size));
      gap: 1px;
      background: var(--bg-grid);
      border-radius: 8px;
      overflow: hidden;
    }
    .snake-cell {
      width: var(--cell-size);
      height: var(--cell-size);
      background: var(--bg-cell);
      border-radius: 2px;
    }
    .snake-cell.snake {
      background: var(--gradient);
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
      border-radius: 4px;
    }
    .snake-cell.snake-head {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.7);
      border-radius: 50%;
    }
    .snake-cell.food {
      background: var(--food-color);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
      border-radius: 50%;
      animation: foodPulse 1s ease-in-out infinite;
    }
    @keyframes foodPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .snake-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .snake-btn {
      padding: 12px 32px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .snake-btn.start {
      background: var(--gradient);
      color: white;
    }
    .snake-btn.start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    .snake-btn.restart {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--bg-tertiary);
    }
    .snake-btn.restart:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    .snake-difficulty {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .diff-btn {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1px solid var(--bg-tertiary);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }
    .diff-btn:hover:not(.active) {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }
    .snake-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-radius: 16px;
    }
    .snake-overlay h2 {
      font-size: 1.8rem;
      color: white;
      font-weight: 700;
    }
    .snake-overlay p {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
    }
    .snake-overlay .final-score {
      font-size: 2rem;
      color: #6366f1;
      font-weight: 700;
    }
    .snake-instructions {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .snake-instructions i {
      margin: 0 4px;
    }
    .snake-back-btn {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 100;
    }
    .snake-back-btn:hover {
      background: var(--accent-primary);
      color: white;
      transform: translateX(-2px);
    }
    @media (max-width: 500px) {
      :root {
        --cell-size: 18px;
      }
      .snake-container {
        padding: 70px 10px 30px;
      }
      .snake-title {
        font-size: 1.5rem;
      }
      .snake-score-bar {
        gap: 20px;
        font-size: 0.9rem;
      }
      .snake-back-btn {
        top: 70px;
        left: 10px;
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-content">
      <a href="index.html" class="nav-logo">蘇魚</a>
      <ul class="nav-links">
        <li><a href="index.html#about">关于</a></li>
        <li><a href="index.html#skills">技能</a></li>
        <li><a href="index.html#projects">作品</a></li>
        <li><a href="index.html#hobbies">爱好</a></li>
        <li><a href="novel.html">小说</a></li>
        <li><a href="tools.html">工具</a></li>
        <li><a href="comic.html">漫画</a></li>
        <li><a href="snake.html" class="active">贪吃蛇</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <button class="snake-back-btn" onclick="location.href='index.html#projects'">
    <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
  </button>

  <div class="snake-container">
    <div class="snake-header">
      <h1 class="snake-title">🐍 贪吃蛇</h1>
      <p class="snake-subtitle">经典小游戏，用键盘方向键控制</p>
    </div>

    <div class="snake-score-bar">
      <div class="snake-score">
        <i data-lucide="star" style="width:16px;height:16px;color:#fbbf24;"></i>
        <span>分数:</span>
        <span class="snake-score-value" id="score">0</span>
      </div>
      <div class="snake-highscore">
        <i data-lucide="trophy" style="width:16px;height:16px;color:#f59e0b;"></i>
        <span>最高分:</span>
        <span class="snake-score-value" id="highscore">0</span>
      </div>
    </div>

    <div class="snake-game-area">
      <div class="snake-grid" id="gameGrid"></div>
      <div class="snake-overlay" id="gameOverlay" style="display:none;">
        <h2 id="overlayTitle">游戏结束</h2>
        <p>最终得分</p>
        <p class="final-score" id="finalScore">0</p>
        <button class="snake-btn restart" id="restartBtn">
          <i data-lucide="rotate-ccw" style="width:18px;height:18px;"></i>
          再来一局
        </button>
      </div>
    </div>

    <div class="snake-controls">
      <button class="snake-btn start" id="startBtn">
        <i data-lucide="play" style="width:18px;height:18px;"></i>
        开始游戏
      </button>
      <div class="snake-difficulty">
        <button class="diff-btn active" data-diff="slow">慢速</button>
        <button class="diff-btn" data-diff="normal">正常</button>
        <button class="diff-btn" data-diff="fast">快速</button>
      </div>
    </div>

    <div class="snake-instructions">
      <p>⬆️ ⬇️ ⬅️ ➡️ 键盘方向键控制移动</p>
      <p>🖱️ 点击开始按钮或空格键开始游戏</p>
    </div>
  </div>

  <script>
    (function() {
      const GRID_SIZE = 20;
      const CELL_SIZE = 24;
      const INITIAL_SPEED = 150;
      const SPEEDS = { slow: 200, normal: 150, fast: 100 };

      let snake = [{ x: 10, y: 10 }];
      let food = { x: 15, y: 10 };
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let score = 0;
      let highscore = 0;
      let gameRunning = false;
      let gameInterval = null;
      let currentSpeed = INITIAL_SPEED;

      const gridEl = document.getElementById('gameGrid');
      const scoreEl = document.getElementById('score');
      const highscoreEl = document.getElementById('highscore');
      const overlayEl = document.getElementById('gameOverlay');
      const overlayTitleEl = document.getElementById('overlayTitle');
      const finalScoreEl = document.getElementById('finalScore');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');

      function initHighscore() {
        const saved = localStorage.getItem('suyu-snake-highscore');
        if (saved) highscore = parseInt(saved);
        highscoreEl.textContent = highscore;
      }

      function saveHighscore() {
        if (score > highscore) {
          highscore = score;
          localStorage.setItem('suyu-snake-highscore', highscore.toString());
          highscoreEl.textContent = highscore;
        }
      }

      function createGrid() {
        gridEl.innerHTML = '';
        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = 'snake-cell';
            cell.dataset.x = x;
            cell.dataset.y = y;
            gridEl.appendChild(cell);
          }
        }
      }

      function getCell(x, y) {
        return gridEl.querySelector(`[data-x="${x}"][data-y="${y}"]`);
      }

      function spawnFood() {
        let newFood;
        do {
          newFood = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
          };
        } while (snake.some(s => s.x === newFood.x && s.y === newFood.y));
        food = newFood;
      }

      function draw() {
        gridEl.querySelectorAll('.snake-cell').forEach(cell => {
          cell.className = 'snake-cell';
        });

        snake.forEach((segment, index) => {
          const cell = getCell(segment.x, segment.y);
          if (cell) {
            cell.classList.add('snake');
            if (index === 0) cell.classList.add('snake-head');
          }
        });

        const foodCell = getCell(food.x, food.y);
        if (foodCell) {
          foodCell.classList.add('food');
        }
      }

      function move() {
        direction = { ...nextDirection };
        const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
          gameOver();
          return;
        }

        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          gameOver();
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreEl.textContent = score;
          spawnFood();
          if (currentSpeed > 60 && score % 50 === 0) {
            currentSpeed -= 5;
            updateGameSpeed();
          }
        } else {
          snake.pop();
        }

        draw();
      }

      function updateGameSpeed() {
        if (gameInterval) {
          clearInterval(gameInterval);
          gameInterval = setInterval(move, currentSpeed);
        }
      }

      function startGame() {
        snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        scoreEl.textContent = score;
        spawnFood();
        gameRunning = true;
        overlayEl.style.display = 'none';
        startBtn.style.display = 'none';
        draw();
        gameInterval = setInterval(move, currentSpeed);
      }

      function gameOver() {
        gameRunning = false;
        clearInterval(gameInterval);
        saveHighscore();
        overlayTitleEl.textContent = '游戏结束';
        finalScoreEl.textContent = score;
        overlayEl.style.display = 'flex';
        startBtn.style.display = 'none';
      }

      function handleKeyDown(e) {
        if (!gameRunning && e.code !== 'Space') return;

        if (e.code === 'Space') {
          if (!gameRunning) startGame();
          return;
        }

        switch (e.code) {
          case 'ArrowUp':
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
            break;
          case 'ArrowDown':
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
            break;
          case 'ArrowLeft':
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
            break;
          case 'ArrowRight':
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
            break;
        }
      }

      function handleTouch(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = gridEl.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const dx = x - centerX;
        const dy = y - centerY;

        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
          else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        } else {
          if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
          else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        }

        if (!gameRunning) startGame();
      }

      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);

      document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentSpeed = SPEEDS[this.dataset.diff];
          if (gameRunning) updateGameSpeed();
        });
      });

      document.addEventListener('keydown', handleKeyDown);
      gridEl.addEventListener('touchstart', handleTouch, { passive: false });

      initHighscore();
      createGrid();
      spawnFood();
      draw();

      const navToggle = document.getElementById('navToggle');
      const navLinks = document.querySelector('.nav-links');
      const navOverlay = document.getElementById('navOverlay');
      if (navToggle && navLinks) {
        function closeNav() {
          navToggle.classList.remove('active');
          navLinks.classList.remove('active');
          if (navOverlay) navOverlay.classList.remove('active');
        }
        navToggle.addEventListener('click', function() {
          navToggle.classList.toggle('active');
          navLinks.classList.toggle('active');
          if (navOverlay) navOverlay.classList.toggle('active');
        });
        navLinks.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', closeNav);
        });
        if (navOverlay) navOverlay.addEventListener('click', closeNav);
      }

      function safeLucide() {
        if (typeof lucide !== 'undefined') {
          try { lucide.createIcons(); } catch(e) { console.warn('Lucide error:', e); }
        }
      }
      safeLucide();
    })();
  </script>
</body>
</html>
